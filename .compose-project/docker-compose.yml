# =============================================================================
# Arsenale — Production Docker Compose
# =============================================================================
#
# Self-contained production deployment for Arsenale, a remote desktop & SSH
# connection manager with encrypted credential vault.
#
# Prerequisites:
#   - Docker Engine 24+ with Compose V2 plugin
#   - The Arsenale source code cloned into ./arsenale/ (install.sh does this)
#   - A configured .env file in this directory (install.sh generates secrets)
#
# Quick start:
#   chmod +x install.sh && ./install.sh
#
# Manual start (after install):
#   docker compose up -d --build
#
# Architecture:
#   ┌─────────────────────────────────────────────────────────┐
#   │                    Docker Network                       │
#   │                   (arsenale_net)                        │
#   │                                                         │
#   │  ┌──────────┐   ┌──────────┐   ┌──────────────────┐   │
#   │  │ postgres  │   │  guacd   │   │     guacenc      │   │
#   │  │ (db:5432) │   │ (:4822)  │   │ (video enc:3003) │   │
#   │  └─────┬─────┘   └─────┬────┘   └────────┬─────────┘   │
#   │        │               │                  │             │
#   │        └───────┬───────┘                  │             │
#   │                │                          │             │
#   │         ┌──────┴──────┐                   │             │
#   │         │   server    │───────────────────┘             │
#   │         │ (api:3001)  │                                 │
#   │         │ (ws:3002)   │                                 │
#   │         └──────┬──────┘                                 │
#   │                │                                        │
#   │         ┌──────┴──────┐     ┌───────────────┐          │
#   │         │   client    │     │  ssh-gateway   │          │
#   │         │ (nginx:8080)│     │   (:2222 SSH)  │          │
#   │         └──────┬──────┘     └───────┬───────┘          │
#   └────────────────┼────────────────────┼──────────────────┘
#                    │                    │
#              :3000 (HTTP)         :2222 (SSH)
#              ▼ exposed ▼         ▼ exposed ▼
#
# Only ports 3000 (web UI) and 2222 (SSH gateway) are exposed to the host.
# The client's Nginx reverse-proxies /api, /socket.io, and /guacamole to the
# server internally — no need to expose server ports.
#
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — Primary database
  # ---------------------------------------------------------------------------
  # Stores users, connections, folders, shared links, refresh tokens, audit
  # logs, and encrypted vault entries. Data persists in the 'pgdata' volume.
  # The server runs Prisma migrations automatically on startup.
  postgres:
    image: postgres:16
    container_name: arsenale-postgres
    env_file:
      - .env
    # POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB are read from .env
    # and used by the official postgres image to create the database on first run.
    volumes:
      # Named volume for database persistence across container restarts.
      # WARNING: Deleting this volume destroys all data. Back up regularly.
      - pgdata:/var/lib/postgresql/data
      # Custom HBA: SSL-only remote connections, reject plaintext
      - ./arsenale/infrastructure/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    # Load custom pg_hba.conf to enforce SSL-only remote connections
    command: ["postgres", "-c", "hba_file=/etc/postgresql/pg_hba.conf"]
    restart: always
    healthcheck:
      # pg_isready checks if PostgreSQL is accepting connections.
      # Uses the same user/db from .env so the probe is authenticated.
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-arsenale} -d ${POSTGRES_DB:-arsenale}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - net-db

  # ---------------------------------------------------------------------------
  # Apache Guacamole Daemon (guacd) — RDP/VNC protocol handler
  # ---------------------------------------------------------------------------
  # guacd is the server-side component of Apache Guacamole. It speaks native
  # RDP, VNC, and SSH protocols and translates them into the Guacamole protocol,
  # which is then tunneled over WebSocket to the browser.
  #
  # The Arsenale server connects to guacd on port 4822 (internal only).
  # Users never connect to guacd directly — the client's Nginx proxies
  # /guacamole WebSocket traffic through the server container.
  guacd:
    image: ${ORCHESTRATOR_GUACD_IMAGE:-guacamole/guacd:1.6.0}
    container_name: arsenale-guacd
    environment:
      # TLS encryption for guacd listener (Guacamole native protocol).
      # When enabled, all traffic between guacamole-lite and guacd is encrypted.
      GUACD_SSL: "${GUACD_SSL:-false}"
      GUACD_SSL_CERT: /certs/server-cert.pem
      GUACD_SSL_KEY: /certs/server-key.pem
    volumes:
      # Shared drive for RDP file redirection (drag-and-drop file transfer).
      # The server writes uploaded files here; guacd makes them available
      # inside the remote desktop session.
      - arsenale_drive:/guacd-drive
      # Session recordings directory. guacd writes .guac (RDP/VNC) and .cast
      # (SSH) recording files here. The guacenc service converts them to video.
      - arsenale_recordings:/recordings
      # TLS certificates for encrypted guacd communication
      - ${GUACD_CERT_DIR:-./arsenale/dev-certs/guacd}:/certs:ro
    restart: always
    healthcheck:
      # Verify guacd is listening on its native protocol port.
      test: ["CMD-SHELL", "nc -z localhost 4822 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - net-guacd

  # ---------------------------------------------------------------------------
  # Guacenc — Session recording video converter (optional)
  # ---------------------------------------------------------------------------
  # Converts .guac files (Guacamole recording format) to .m4v video and .cast
  # files (asciinema terminal recordings) to .mp4. This is a lightweight Python
  # HTTP service that wraps the guacenc binary and agg tool.
  #
  # If you don't need session recording playback as video, you can comment out
  # this entire service — the rest of the stack will work fine without it.
  guacenc:
    build:
      context: ./arsenale/gateways/guacenc
      dockerfile: Dockerfile
    container_name: arsenale-guacenc
    volumes:
      # Same recordings volume as guacd — guacenc reads raw recordings and
      # writes converted video files back to the same directory.
      - arsenale_recordings:/recordings
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:3003/health')\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - net-guacenc

  # ---------------------------------------------------------------------------
  # GoCache — In-memory cache sidecar (gRPC)
  # ---------------------------------------------------------------------------
  # Lightweight in-memory cache for session data, rate limiting, and temporary
  # state. Communicates with the server over gRPC on port 6380.
  gocache:
    build:
      context: ./arsenale/infrastructure/gocache
      dockerfile: Dockerfile
    container_name: arsenale-gocache
    environment:
      CACHE_LISTEN: "tcp://0.0.0.0:6380"
      CACHE_HEALTH_ADDR: "0.0.0.0:6381"
      CACHE_DISCOVERY: "manual"
      # mTLS — set paths inside the container; certs are mounted below
      CACHE_TLS_CA: "${CACHE_TLS_CA:-}"
      CACHE_TLS_CERT: "${CACHE_TLS_CERT:-}"
      CACHE_TLS_KEY: "${CACHE_TLS_KEY:-}"
    volumes:
      - gocache_data:/data
      # Mount gocache mTLS certificates (optional — leave empty for insecure dev)
      - ${CACHE_TLS_CERT_DIR:-./arsenale/dev-certs/gocache}:/certs:ro
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6381/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - net-cache

  # ---------------------------------------------------------------------------
  # Server — Express.js API + WebSocket backend
  # ---------------------------------------------------------------------------
  # The core Arsenale server. Handles:
  #   - REST API on port 3001 (auth, connections, folders, vault, sharing, admin)
  #   - Socket.IO on port 3001 (SSH terminal sessions via XTerm.js)
  #   - Guacamole WebSocket tunnel on port 3002 (RDP/VNC sessions)
  #   - Prisma ORM for database access (auto-migrates on startup)
  #   - AES-256-GCM encrypted credential vault with Argon2 key derivation
  #   - JWT authentication with automatic token refresh
  #   - Managed gateway orchestration (SSH gateway lifecycle)
  #
  # Neither port is exposed to the host — Nginx in the client container
  # proxies all traffic internally over the Docker network.
  server:
    build:
      # Build context is the monorepo root because the Dockerfile copies
      # from server/package.json, server/prisma/, server/src/ etc.
      context: ./arsenale
      dockerfile: server/Dockerfile
    container_name: arsenale-server
    # Security hardening: drop all capabilities, add only what's needed.
    cap_drop:
      - ALL
    cap_add:
      # Required for binding to ports < 1024 (not used here, but kept for
      # compatibility if PORT is changed to 80/443).
      - NET_BIND_SERVICE
    security_opt:
      # Prevent privilege escalation via setuid/setgid binaries.
      - no-new-privileges:true
    healthcheck:
      # The /api/health endpoint returns 200 only after migrations are done
      # and the server is fully initialized (ready to accept connections).
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      # Server needs time to run migrations and initialize on first boot.
      start_period: 30s
    depends_on:
      # Don't start the server until the database is accepting connections.
      postgres:
        condition: service_healthy
      # Don't start until guacd is ready (RDP/VNC connections need it).
      guacd:
        condition: service_healthy
      # Don't start until the cache sidecar is ready.
      gocache:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      # Shared drive for RDP file redirection (same as guacd).
      - arsenale_drive:/guacd-drive
      # Session recordings (server manages recording lifecycle).
      - arsenale_recordings:/recordings
      # Docker socket — allows the server to manage gateway containers
      # (deploy/remove SSH gateways, health checks, reconciliation).
      # Mount as read-only for security. If you don't use managed gateways,
      # you can remove this line.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always
    networks:
      - net-db
      - net-guacd
      - net-guacenc
      - net-cache
      - net-gateway

  # ---------------------------------------------------------------------------
  # Client — React SPA served by Nginx
  # ---------------------------------------------------------------------------
  # Multi-stage build: Node.js compiles the React app with Vite, then the
  # static output is served by Nginx on port 8080 (mapped to host port 3000).
  #
  # Nginx also acts as the reverse proxy for the entire stack:
  #   /api/*        → server:3001  (REST API)
  #   /socket.io/*  → server:3001  (SSH terminal WebSocket)
  #   /guacamole/*  → server:3002  (RDP/VNC WebSocket tunnel)
  #   /*            → static files (React SPA with client-side routing)
  #
  # This means only ONE port (3000) needs to be exposed to the outside world.
  client:
    build:
      # Build context is the monorepo root — the Dockerfile copies from
      # client/package.json, client/src/, client/nginx.conf etc.
      context: ./arsenale
      dockerfile: client/Dockerfile
    container_name: arsenale-client
    ports:
      # Map container port 8080 (Nginx) to host port 3000.
      # Change the left side to use a different host port (e.g., "80:8080"
      # or "443:8080" if terminating TLS externally).
      - "${CLIENT_PORT:-3000}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      # Wait for the server to be healthy before starting Nginx.
      # This ensures the API is ready when users hit the web UI.
      server:
        condition: service_healthy
    restart: always
    networks:
      - net-gateway

  # ---------------------------------------------------------------------------
  # SSH Gateway — Managed SSH tunnel for TCP port forwarding (optional)
  # ---------------------------------------------------------------------------
  # Provides a lightweight SSH server that allows users to create TCP port
  # forwarding tunnels to remote machines through Arsenale. Users connect
  # via standard SSH clients (e.g., ssh -L 3389:target:3389 tunnel@host -p 2222).
  #
  # The server manages this container's lifecycle: deploying keys, health
  # checking, and reconciling state. If you don't need SSH tunneling,
  # comment out this entire service block.
  #
  # For multiple gateways (e.g., DMZ + LAN), duplicate this block with
  # different names and port mappings:
  #   ssh-gateway-dmz:  ports: ["2222:2222"]
  #   ssh-gateway-lan:  ports: ["2223:2222"]
  ssh-gateway:
    build:
      # Build context is the monorepo root — copies from gateways/ssh-gateway/
      # and gateways/tunnel-agent/ (embedded tunnel agent).
      context: ./arsenale
      dockerfile: gateways/ssh-gateway/Dockerfile
    container_name: arsenale-ssh-gateway
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost ${SSH_PORT:-2222} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    env_file:
      - .env
    environment:
      # Key API HTTPS certificates (mounted from dev-certs or production certs)
      GATEWAY_API_TLS_CERT: /certs/server-cert.pem
      GATEWAY_API_TLS_KEY: /certs/server-key.pem
    ports:
      # SSH port exposed to the host. Users connect with:
      #   ssh -p 2222 tunnel@<your-server-ip>
      - "${SSH_GATEWAY_PORT:-2222}:2222"
    volumes:
      # Mount authorized SSH public keys. The server pushes keys here
      # via the Gateway API, or you can manage them manually.
      - ./config/ssh-gateway/authorized_keys:/config/authorized_keys:ro
      # TLS certificates for the key management API
      - ${SSH_GATEWAY_CERT_DIR:-./arsenale/dev-certs/ssh-gateway}:/certs:ro
    restart: always
    networks:
      - net-gateway

# =============================================================================
# Volumes — Persistent data storage
# =============================================================================
# Docker named volumes persist data across container restarts and rebuilds.
# To see volume locations: docker volume inspect arsenale-pgdata
# To back up: see ./manage.sh backup
volumes:
  # GoCache data directory. Persists cache state across container restarts.
  gocache_data:

  # PostgreSQL data directory. Contains all database tables, indexes, and WAL.
  # This is the most critical volume — losing it means losing all data.
  pgdata:

  # RDP file redirection staging area. Files uploaded via drag-and-drop in
  # RDP sessions are stored here temporarily and made available inside the
  # remote desktop. Shared between server (writes) and guacd (reads).
  arsenale_drive:

  # Session recordings. Raw recording files (.guac for RDP/VNC, .cast for SSH)
  # written by guacd, read by guacenc for video conversion, and managed by the
  # server (cleanup, retention policy). Shared across three services.
  arsenale_recordings:

# =============================================================================
# Networks — Zero-trust segmented container networks
# =============================================================================
# Each service connects ONLY to its dedicated network. The server container
# is the sole hub that bridges all networks. No service can reach another
# service outside its designated network segment.
#
#   net-db:      server ↔ postgres (SSL-only via pg_hba.conf)
#   net-guacd:   server ↔ guacd
#   net-guacenc: server ↔ guacenc
#   net-cache:   server ↔ gocache (+ gocache peers)
#   net-gateway: server ↔ client, ssh-gateway, managed gateways
#
networks:
  # Server↔PostgreSQL only
  net-db:
    name: arsenale-net-db
  # Server↔guacd only
  net-guacd:
    name: arsenale-net-guacd
  # Server↔guacenc only
  net-guacenc:
    name: arsenale-net-guacenc
  # Server↔gocache + gocache peers
  net-cache:
    name: arsenale-net-cache
  # Server↔gateways + client (user-facing)
  net-gateway:
    name: arsenale-net-gateway
