services:
  website:
    image: ghcr.io/dnviti/arsenale-website
    container_name: website
    pull_policy: always
    restart: always
    ports:
      - 8080:8080
    environment:
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama-web:11434
      OLLAMA_MODEL: qwen3.5:0.8b
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - proxy-net

  ollama-web:
    image: ollama/ollama
    container_name: ollama-web
    pull_policy: always
    restart: always
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:11434/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - proxy-net

  postgres:
    image: postgres:16
    container_name: postgres
    pull_policy: always
    security_opt:
      - label:disable
    env_file:
      - .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-arsenale} -d ${POSTGRES_DB:-arsenale}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - arsenale-back-net

  guacd:
    image: guacamole/guacd
    container_name: guacd
    pull_policy: always
    security_opt:
      - label:disable
    volumes:
      - arsenale_drive:/guacd-drive
      - arsenale_recordings:/recordings
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4822 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - arsenale-back-net

  guacenc:
    image: ghcr.io/dnviti/arsenale/guacenc
    container_name: guacenc
    pull_policy: always
    security_opt:
      - label:disable
    environment:
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - arsenale_recordings:/recordings
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - arsenale-back-net

  redis:
    image: quay.io/sclorg/redis-7-c9s
    container_name: redis
    pull_policy: always
    security_opt:
      - label:disable
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h 127.0.0.1 -p 6379 ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - arsenale-back-net

  server:
    image: ghcr.io/dnviti/arsenale/server
    container_name: server
    pull_policy: always
    security_opt:
      - label:disable
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      guacd:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: "redis://redis:6379/0"
    env_file:
      - .env.prod
    volumes:
      - arsenale_drive:/guacd-drive
      - arsenale_recordings:/recordings
    restart: always
    networks:
      - arsenale-front-net
      - arsenale-back-net

  demo-seed:
    image: ghcr.io/dnviti/arsenale/server
    container_name: demo-seed
    pull_policy: always
    security_opt:
      - label:disable
    healthcheck:
      disable: true
    depends_on:
      server:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      - CLI_ENABLED=true
    command: ["node", "dist/cli.js", "demo", "setup"]
    restart: "no"
    networks:
      - arsenale-back-net

  client:
    image: ghcr.io/dnviti/arsenale/client
    container_name: client
    pull_policy: always
    security_opt:
      - label:disable
    ports:
      - 8081:8080
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      server:
        condition: service_healthy
    restart: always
    networks:
      - proxy-net
      - arsenale-front-net

  # SSH Gateway (optional — remove or comment out if not needed)
  # For multiple gateways, duplicate with different names and ports:
  #   ssh-gateway-dmz:  ports: ["2222:2222"]
  #   ssh-gateway-lan:  ports: ["2223:2222"]
  ssh-gateway:
    image: ghcr.io/dnviti/arsenale/ssh-gateway
    container_name: ssh-gateway
    pull_policy: always
    security_opt:
      - label:disable
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 ${SSH_PORT:-2222} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    env_file:
      - .env.prod
    volumes:
      - ./config/ssh-gateway/authorized_keys:/config/authorized_keys:ro,z
    restart: always
    networks:
      - arsenale-back-net

  ollama-backend:
    image: ollama/ollama
    container_name: ollama-backend
    pull_policy: always
    restart: always
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:11434/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - arsenale-back-net

volumes:
  pgdata:
  arsenale_drive:
  arsenale_recordings:
  ollama_models:

networks:
  proxy-net:
    name: proxy-net
    # External access for website and client ports
  arsenale-front-net:
    name: arsenale-front-net
    internal: true
  arsenale-back-net:
    name: arsenale-back-net
    internal: true
