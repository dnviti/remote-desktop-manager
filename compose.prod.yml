services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rdm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-remote_desktop_manager}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rdm} -d ${POSTGRES_DB:-remote_desktop_manager}"]
      interval: 5s
      timeout: 5s
      retries: 5

  guacd:
    image: guacamole/guacd
    volumes:
      - rdm_drive:/guacd-drive
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4822 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  server:
    image: ghcr.io/dnviti/remote-desktop-manager/server:latest
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      guacd:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rdm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-remote_desktop_manager}
      GUACD_HOST: guacd
      GUACD_PORT: 4822
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.production}
      GUACAMOLE_SECRET: ${GUACAMOLE_SECRET:?Set GUACAMOLE_SECRET in .env.production}
      NODE_ENV: production
      PORT: 3001
      GUACAMOLE_WS_PORT: 3002
      VAULT_TTL_MINUTES: ${VAULT_TTL_MINUTES:-30}
      DRIVE_BASE_PATH: /guacd-drive
    volumes:
      - rdm_drive:/guacd-drive
    restart: unless-stopped

  client:
    image: ghcr.io/dnviti/remote-desktop-manager/client:latest
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  # SSH Gateway (optional — remove or comment out if not needed)
  # For multiple gateways, duplicate with different names and ports:
  #   ssh-gateway-dmz:  image: ghcr.io/dnviti/remote-desktop-manager/ssh-gateway:latest
  #                     ports: ["2222:2222"]
  #   ssh-gateway-lan:  image: ghcr.io/dnviti/remote-desktop-manager/ssh-gateway:latest
  #                     ports: ["2223:2222"]
  ssh-gateway:
    image: ghcr.io/dnviti/remote-desktop-manager/ssh-gateway:latest
    ports:
      - "${SSH_GATEWAY_PORT:-2222}:2222"
    environment:
      SSH_AUTHORIZED_KEYS: ${SSH_AUTHORIZED_KEYS:-}
    volumes:
      - ./config/ssh-gateway/authorized_keys:/config/authorized_keys:ro
    restart: unless-stopped

volumes:
  pgdata:
  rdm_drive:
