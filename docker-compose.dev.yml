services:
  guacd:
    image: guacamole/guacd
    ports:
      - "4822:4822"
    volumes:
      - ./data/drive:/guacd-drive
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: rdm
      POSTGRES_PASSWORD: rdm_password
      POSTGRES_DB: remote_desktop_manager
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rdm"]
      interval: 5s
      timeout: 5s
      retries: 5

  # SSH Gateway (optional — uncomment to enable for local testing)
  ssh-gateway:
    build: ./ssh-gateway
    env_file:
      - .env
    ports:
      - "${SSH_GATEWAY_PORT:-2222}:2222"
    restart: unless-stopped

volumes:
  pgdata_dev:
