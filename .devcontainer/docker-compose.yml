services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/app:cached
      - node_modules:/app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ../.env
    ports:
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://arsenale:arsenale_password@postgres:5432/arsenale
      DOCKER_NETWORK: arsenale-devcontainer
      DOCKER_SOCKET_PATH: /var/run/docker.sock
      NODE_ENV: development
    networks:
      - arsenale-devcontainer
    depends_on:
      postgres:
        condition: service_healthy
    command: sleep infinity

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: arsenale
      POSTGRES_PASSWORD: arsenale_password
      POSTGRES_DB: arsenale
    ports:
      - "5432:5432"
    volumes:
      - pgdata_devcontainer:/var/lib/postgresql/data
    networks:
      - arsenale-devcontainer
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arsenale"]
      interval: 5s
      timeout: 5s
      retries: 5

  # guacd and ssh-gateway are NOT included here — the application
  # creates and manages those containers itself via the orchestrator.

networks:
  arsenale-devcontainer:
    name: arsenale-devcontainer

volumes:
  pgdata_devcontainer:
  node_modules:
