  gocache:
    build:
      context: infrastructure/gocache
      dockerfile: Dockerfile
    container_name: gocache
    environment:
      CACHE_LISTEN: "tcp://0.0.0.0:6380"
      CACHE_HEALTH_ADDR: "0.0.0.0:6381"
      CACHE_DISCOVERY: "manual"
      # mTLS — cert paths inside the container (mounted from host below)
      CACHE_TLS_CA: "${CACHE_TLS_CA:-}"
      CACHE_TLS_CERT: "${CACHE_TLS_CERT:-}"
      CACHE_TLS_KEY: "${CACHE_TLS_KEY:-}"
    ports:
      - "127.0.0.1:6380:6380"
      - "127.0.0.1:6381:6381"
    volumes:
      - gocache_data_dev:/data
      # Mount gocache mTLS certificates (read-only) — shared CA at /certs/ca.pem
      - ./dev-certs/ca.pem:/certs/ca.pem:ro
      - ./dev-certs/gocache/server-cert.pem:/certs/server-cert.pem:ro
      - ./dev-certs/gocache/server-key.pem:/certs/server-key.pem:ro
    networks:
      - arsenale-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://localhost:6381/health || wget -qO- http://localhost:6381/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  arsenale-dev:
    name: arsenale-dev

volumes:
  pgdata_dev:
  gocache_data_dev:
