services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: rdm
      POSTGRES_PASSWORD: rdm_password
      POSTGRES_DB: remote_desktop_manager
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    networks:
      - rdm-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rdm -d remote_desktop_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

