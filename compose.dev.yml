  guacenc:
    build:
      context: gateways/guacenc
      dockerfile: Dockerfile
    container_name: guacenc
    restart: always
    ports:
      - "3003:3003"
    environment:
      - RECORDING_PATH=/recordings
      - GUACENC_TLS_CERT=/certs/server-cert.pem
      - GUACENC_TLS_KEY=/certs/server-key.pem
      - GUACENC_AUTH_TOKEN=${GUACENC_AUTH_TOKEN:-}
    volumes:
      - ${RECORDING_PATH:-./data/recordings}:/recordings
      - ./dev-certs/guacenc:/certs:ro
