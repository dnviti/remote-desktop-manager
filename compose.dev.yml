services:
  postgres:
    image: postgres:18
    container_name: postgres
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_dev:/var/lib/postgresql
      - ./dev-certs/postgres/server-cert.pem:/certs/server-cert.pem:ro
      - ./dev-certs/postgres/server-key.pem:/certs/server-key.pem:ro
      - ./dev-certs/ca.pem:/certs/ca.pem:ro
      - ./infrastructure/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command:
      - bash
      - -c
      - |
        cp /certs/server-key.pem /tmp/server.key &&
        chown 999:999 /tmp/server.key &&
        chmod 600 /tmp/server.key &&
        cp /certs/server-cert.pem /tmp/server.crt &&
        cp /certs/ca.pem /tmp/ca.crt &&
        exec docker-entrypoint.sh postgres \
          -c ssl=on \
          -c ssl_cert_file=/tmp/server.crt \
          -c ssl_key_file=/tmp/server.key \
          -c ssl_ca_file=/tmp/ca.crt \
          -c hba_file=/etc/postgresql/pg_hba.conf
    networks:
      - net-db
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  guacd:
    image: guacamole/guacd:1.6.0
    container_name: guacd
    read_only: true
    tmpfs:
      - /tmp
    command: ["-C", "${GUACD_SSL_CERT}", "-K", "${GUACD_SSL_KEY}"]
    volumes:
      - ${RECORDING_PATH:-./data/recordings}:/recordings
      - ./dev-certs/guacd:/certs:ro
    networks:
      - net-guacd
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "netstat -tln | grep -q ':${GUACD_PORT} ' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  guacenc:
    build:
      context: gateways/guacenc
      dockerfile: Dockerfile
    container_name: guacenc
    read_only: true
    tmpfs:
      - /tmp
    restart: always
    environment:
      RECORDING_PATH: ${GUACENC_RECORDING_PATH}
      GUACENC_TLS_CERT: ${GUACENC_TLS_CERT}
      GUACENC_TLS_KEY: ${GUACENC_TLS_KEY}
      GUACENC_AUTH_TOKEN: ${GUACENC_AUTH_TOKEN:-}
    volumes:
      - ${RECORDING_PATH:-./data/recordings}:/recordings
      - ./dev-certs/guacenc:/certs:ro
    networks:
      - net-guacenc
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c "import urllib.request,ssl; urllib.request.urlopen(''https://localhost:3003/health'',context=ssl._create_unverified_context())" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  gocache:
    build:
      context: infrastructure/gocache
      dockerfile: Dockerfile
    container_name: gocache
    read_only: true
    tmpfs:
      - /tmp
    environment:
      CACHE_LISTEN: ${CACHE_LISTEN}
      CACHE_HEALTH_ADDR: ${CACHE_HEALTH_ADDR}
      CACHE_DISCOVERY: ${CACHE_DISCOVERY}
      CACHE_TLS_CA: ${CACHE_TLS_CA:-}
      CACHE_TLS_CERT: ${CACHE_TLS_CERT:-}
      CACHE_TLS_KEY: ${CACHE_TLS_KEY:-}
    volumes:
      - gocache_data_dev:/data
      - ./dev-certs/ca.pem:/certs/ca.pem:ro
      - ./dev-certs/gocache/server-cert.pem:/certs/server-cert.pem:ro
      - ./dev-certs/gocache/server-key.pem:/certs/server-key.pem:ro
    networks:
      - net-cache
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-check-certificate -qO- https://localhost:6381/health || wget -qO- http://localhost:6381/health || exit 1",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  server:
    # read_only: false — dev mode requires writable FS for HMR/cache
    build:
      context: .
      dockerfile: server/Dockerfile
      target: dev
    container_name: arsenale-server
    working_dir: /app
    userns_mode: keep-id
    command: >
      sh -c "npx prisma generate --schema=server/prisma/schema.prisma &&
             npx tsx watch server/src/index.ts"
    volumes:
      - .:/app
      # Podman socket for container orchestration (rootless)
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/podman/podman.sock:/var/run/docker.sock:ro
      # Dev certificates (read-only)
      - ./dev-certs:/app/dev-certs:ro
    env_file:
      - .env
    environment:
      # Override host-oriented values for Docker networking
      DATABASE_URL: ${DATABASE_URL_DOCKER}
      GUACD_HOST: ${GUACD_HOST_DOCKER}
      GUACD_PORT: ${GUACD_PORT}
      GUACD_SSL: ${GUACD_SSL}
      GUACD_CA_CERT: ${GUACD_CA_CERT_DOCKER}
      DOCKER_NETWORK: ${DOCKER_NETWORK}
      DOCKER_SOCKET_PATH: ${DOCKER_SOCKET_PATH}
      NODE_ENV: ${NODE_ENV}
      NODE_EXTRA_CA_CERTS: ${NODE_EXTRA_CA_CERTS_DOCKER}
      # Server TLS (Express HTTPS + Guacamole WSS)
      SERVER_TLS_CERT: ${SERVER_TLS_CERT_DOCKER}
      SERVER_TLS_KEY: ${SERVER_TLS_KEY_DOCKER}
      # Tunnel mTLS server
      TUNNEL_SERVER_CERT: ${TUNNEL_SERVER_CERT_DOCKER}
      TUNNEL_SERVER_KEY: ${TUNNEL_SERVER_KEY_DOCKER}
      TUNNEL_SERVER_CA: ${TUNNEL_SERVER_CA_DOCKER}
      # gocache mTLS client certs (server -> gocache)
      CACHE_SIDECAR_URL: ${CACHE_SIDECAR_URL_DOCKER}
      CACHE_SIDECAR_TLS_CA: ${CACHE_SIDECAR_TLS_CA_DOCKER}
      CACHE_SIDECAR_TLS_CERT: ${CACHE_SIDECAR_TLS_CERT_DOCKER}
      CACHE_SIDECAR_TLS_KEY: ${CACHE_SIDECAR_TLS_KEY_DOCKER}
      # guacenc sidecar
      GUACENC_SERVICE_URL: ${GUACENC_SERVICE_URL_DOCKER}
      GUACENC_USE_TLS: ${GUACENC_USE_TLS}
      # Gateway gRPC mTLS client certs (server -> ssh-gateway key mgmt)
      GATEWAY_GRPC_TLS_CA: ${GATEWAY_GRPC_TLS_CA_DOCKER}
      GATEWAY_GRPC_TLS_CERT: ${GATEWAY_GRPC_TLS_CERT_DOCKER}
      GATEWAY_GRPC_TLS_KEY: ${GATEWAY_GRPC_TLS_KEY_DOCKER}
      # Client URL
      CLIENT_URL: ${CLIENT_URL}
    networks:
      - net-db
      - net-guacd
      - net-guacenc
      - net-cache
      - net-gateway
    depends_on:
      postgres:
        condition: service_healthy
      guacd:
        condition: service_healthy
      gocache:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-check-certificate -qO- https://localhost:${PORT}/api/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  client:
    # read_only: false — dev mode requires writable FS for HMR/cache
    build:
      context: .
      dockerfile: client/Dockerfile
      target: dev
    container_name: arsenale-client
    working_dir: /app/client
    userns_mode: keep-id
    command: npx vite --host
    volumes:
      - .:/app
      - /app/node_modules
      - ./dev-certs:/app/dev-certs:ro
    ports:
      - "3000:3000"
    environment:
      VITE_API_TARGET: ${VITE_API_TARGET_DOCKER}
      VITE_GUAC_TARGET: ${VITE_GUAC_TARGET_DOCKER}
      VITE_TLS_CERT: ${VITE_TLS_CERT_DOCKER}
      VITE_TLS_KEY: ${VITE_TLS_KEY_DOCKER}
      NODE_EXTRA_CA_CERTS: ${NODE_EXTRA_CA_CERTS_DOCKER}
    networks:
      - net-gateway
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-check-certificate -qO- https://localhost:3000 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  ssh-gateway:
    build:
      context: .
      dockerfile: gateways/ssh-gateway/Dockerfile
    container_name: arsenale-ssh-gateway
    read_only: true
    tmpfs:
      - /tmp
    environment:
      SSH_PORT: ${SSH_PORT}
      # gRPC key management mTLS (replaces old HTTPS + bearer token API)
      GATEWAY_GRPC_PORT: ${GATEWAY_GRPC_PORT}
      GATEWAY_GRPC_TLS_CA: ${GATEWAY_GRPC_TLS_CA_GW}
      GATEWAY_GRPC_TLS_CERT: ${GATEWAY_GRPC_TLS_CERT_GW}
      GATEWAY_GRPC_TLS_KEY: ${GATEWAY_GRPC_TLS_KEY_GW}
      NODE_EXTRA_CA_CERTS: ${NODE_EXTRA_CA_CERTS_GW}
    volumes:
      - ./dev-certs/ssh-gateway:/certs:ro
      - ./dev-certs/ca.pem:/certs/ca.pem:ro
    networks:
      - net-gateway
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost ${SSH_PORT} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  tunnel-agent:
    build:
      context: gateways/tunnel-agent
      dockerfile: Dockerfile
    container_name: arsenale-tunnel-agent
    read_only: true
    tmpfs:
      - /tmp
    command:
      - sh
      - -c
      - |
        if [ -z "$TUNNEL_TOKEN" ] || [ -z "$TUNNEL_GATEWAY_ID" ]; then
          echo "[tunnel-agent] No TUNNEL_TOKEN/TUNNEL_GATEWAY_ID — running in dormant mode"
          exec tail -f /dev/null
        fi
        exec node dist/index.js
    environment:
      TUNNEL_SERVER_URL: ${TUNNEL_SERVER_URL_DOCKER}
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
      TUNNEL_GATEWAY_ID: ${TUNNEL_GATEWAY_ID:-}
      TUNNEL_CA_CERT: ${TUNNEL_CA_CERT_GW}
      NODE_EXTRA_CA_CERTS: ${NODE_EXTRA_CA_CERTS_GW}
    volumes:
      - ./dev-certs/ca.pem:/certs/ca.pem:ro
      - ./dev-certs/tunnel:/certs/tunnel:ro
    networks:
      - net-gateway
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", 'node -e "process.exit(0)" || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  db-proxy:
    build:
      context: .
      dockerfile: gateways/db-proxy/Dockerfile
    container_name: arsenale-db-proxy
    environment:
      DB_LISTEN_PORT: ${DB_LISTEN_PORT}
      TUNNEL_SERVER_URL: ${DB_PROXY_TUNNEL_SERVER_URL:-}
      TUNNEL_TOKEN: ${DB_PROXY_TUNNEL_TOKEN:-}
      TUNNEL_GATEWAY_ID: ${DB_PROXY_TUNNEL_GATEWAY_ID:-}
      NODE_EXTRA_CA_CERTS: ${NODE_EXTRA_CA_CERTS_GW}
    volumes:
      - ./dev-certs/ca.pem:/certs/ca.pem:ro
    networks:
      - net-gateway
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f /proc/1/status || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  rdgw:
    build:
      context: gateways/rdgw
      dockerfile: Dockerfile
    container_name: arsenale-rdgw
    environment:
      RDGW_LISTEN_ADDR: ${RDGW_LISTEN_ADDR}
      RDGW_TLS_CERT: ${RDGW_TLS_CERT_GW}
      RDGW_TLS_KEY: ${RDGW_TLS_KEY_GW}
      RDGW_ARSENALE_API_URL: ${RDGW_ARSENALE_API_URL_DOCKER}
      RDGW_API_TOKEN: ${RDGW_API_TOKEN:-}
      RDGW_LOG_LEVEL: ${RDGW_LOG_LEVEL}
    volumes:
      - ./dev-certs/rdgw:/certs:ro
      - ./dev-certs/ca.pem:/certs/ca.pem:ro
    networks:
      - net-gateway
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-check-certificate -qO- https://localhost:3443/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  # Server<->PostgreSQL only
  net-db:
    name: arsenale-net-db
    internal: true
  # Server<->guacd only
  net-guacd:
    name: arsenale-net-guacd
    internal: true
  # Server<->guacenc only
  net-guacenc:
    name: arsenale-net-guacenc
    internal: true
  # Server<->gocache + gocache peers
  net-cache:
    name: arsenale-net-cache
    internal: true
  # Server<->gateways (SSH, tunnel, db-proxy, rdgw, client)
  # Needs external access for client port binding and SSH gateway
  net-gateway:
    name: arsenale-net-gateway

volumes:
  pgdata_dev:
  gocache_data_dev:
