services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: arsenale
      POSTGRES_PASSWORD: arsenale_password
      POSTGRES_DB: arsenale
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./dev-certs/postgres/server-cert.pem:/var/lib/postgresql/server.crt:ro
      - ./dev-certs/postgres/server-key.pem:/var/lib/postgresql/server.key:ro
      - ./dev-certs/ca.pem:/var/lib/postgresql/ca.crt:ro
    command: >
      bash -c "
        cp /var/lib/postgresql/server.key /tmp/server.key &&
        chown 999:999 /tmp/server.key &&
        chmod 600 /tmp/server.key &&
        exec postgres
        -c ssl=on
        -c ssl_cert_file=/var/lib/postgresql/server.crt
        -c ssl_key_file=/tmp/server.key
        -c ssl_ca_file=/var/lib/postgresql/ca.crt
      "
    networks:
      - arsenale-dev
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arsenale -d arsenale"]
      interval: 5s
      timeout: 5s
      retries: 5

