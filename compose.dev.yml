services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: arsenale
      POSTGRES_PASSWORD: arsenale_password
      POSTGRES_DB: arsenale
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    networks:
      - arsenale-dev
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arsenale -d arsenale"]
      interval: 5s
      timeout: 5s
      retries: 5

