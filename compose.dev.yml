      context: docker/guacenc
      dockerfile: Dockerfile
    container_name: guacenc
    restart: always
    ports:
      - "3003:3003"
    environment:
      - RECORDING_PATH=/recordings
    volumes:
      - ${RECORDING_PATH:-./data/recordings}:/recordings
    networks:
      - arsenale-dev

