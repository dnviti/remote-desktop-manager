services:
  postgres:
    image: quay.io/sclorg/postgresql-16-c10s
    container_name: arsenale-postgres
    user: 0:0
    read_only: true
    cpus: '1.0'
    mem_limit: 1g
    pids_limit: 256
    tmpfs:
    - /tmp
    - /var/lib/pgsql
    - /run/postgresql
    environment:
      POSTGRES_USER: arsenale
      POSTGRES_DB: arsenale
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
    - postgres_password
    volumes:
    - pgdata:/var/lib/pgsql/data
    - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../infrastructure/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/postgres:/certs:ro
    - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../infrastructure/postgres/entrypoint.sh:/usr/local/bin/arsenale-postgres-entrypoint.sh:ro
    entrypoint:
    - /usr/local/bin/arsenale-postgres-entrypoint.sh
    restart: always
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    security_opt:
    - no-new-privileges:true
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U arsenale -d arsenale
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
    - net-db
  migrate:
    build:
      context: /home/debian/repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: backend/Dockerfile
      args:
        SERVICE: control-plane-api
    container_name: arsenale-migrate
    entrypoint:
    - /usr/local/bin/migrate
    command:
    - up
    read_only: true
    cpus: '0.25'
    mem_limit: 256m
    pids_limit: 64
    tmpfs:
    - /tmp
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    secrets:
    - database_url
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
      DATABASE_SSL_ROOT_CERT: /certs/postgres/ca.pem
      ARSENALE_SKIP_MIGRATION_CHECK: 'true'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
    - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/postgres:/certs/postgres:ro
    restart: 'no'
    networks:
    - net-db
  guacd:
    build:
      context: /home/debian/repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: gateways/guacd/Dockerfile
    container_name: arsenale-guacd
    read_only: true
    cpus: '1.0'
    mem_limit: 512m
    pids_limit: 256
    tmpfs:
    - /tmp
    environment:
      GUACD_SSL: 'true'
      GUACD_SSL_CERT: /certs/server-cert.pem
      GUACD_SSL_KEY: /certs/server-key.pem
    volumes:
    - arsenale_drive:/guacd-drive
    - arsenale_recordings:/recordings
    - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/guacd:/certs:ro
    restart: always
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    healthcheck:
      test:
      - CMD-SHELL
      - netstat -tln | grep -q ':4822 ' || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
    - net-guacd
  guacenc:
    build:
      context: /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../gateways/guacenc
      dockerfile: Dockerfile
    container_name: arsenale-guacenc
    read_only: true
    cpus: '1.0'
    mem_limit: 768m
    pids_limit: 256
    tmpfs:
    - /tmp
    environment:
      GUACENC_AUTH_TOKEN_FILE: /run/secrets/guacenc_auth_token
      REDIS_URL: redis://redis:6379/0
      GUACENC_TLS_CERT: /certs/guacenc/server-cert.pem
      GUACENC_TLS_KEY: /certs/guacenc/server-key.pem
    secrets:
    - guacenc_auth_token
    volumes:
    - arsenale_recordings:/recordings
    - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs:/certs:ro
    restart: always
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    healthcheck:
      test:
      - CMD-SHELL
      - curl --silent --show-error --fail --insecure https://127.0.0.1:3003/health
        >/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
    - net-guacenc
    - net-cache
  redis:
    image: quay.io/sclorg/redis-7-c9s
    container_name: arsenale-redis
    command:
    - run-redis
    - --appendonly
    - 'yes'
    cpus: '0.5'
    mem_limit: 256m
    pids_limit: 256
    tmpfs:
    - /tmp
    restart: always
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    volumes:
    - arsenale_redis:/var/lib/redis/data
    healthcheck:
      test:
      - CMD-SHELL
      - redis-cli -h 127.0.0.1 -p 6379 ping | grep -q PONG
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
    - net-cache
  control-plane-api:
    build:
      context: /home/debian/repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: backend/Dockerfile
      args:
        SERVICE: control-plane-api
    container_name: arsenale-control-plane-api
    entrypoint:
    - /bin/sh
    - -lc
    - mkdir -p /guacd-drive /recordings && chmod 1777 /guacd-drive /recordings &&
      exec /usr/local/bin/service
    user: 0:0
    read_only: true
    cpus: '0.5'
    mem_limit: 512m
    pids_limit: 128
    tmpfs:
    - /tmp
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    secrets:
    - database_url
    - guacamole_secret
    - guacenc_auth_token
    - jwt_secret
    - server_encryption_key
    environment:
      PORT: '8080'
      ARSENALE_VERSION: latest
      GO_QUERY_RUNNER_ENABLED: 'true'
      HIBP_FAIL_OPEN: 'true'
      CLIENT_URL: https://arsenale.home.arpa.viti
      WEBAUTHN_RP_ID: arsenale.home.arpa.viti
      WEBAUTHN_RP_ORIGIN: https://arsenale.home.arpa.viti
      ORCHESTRATOR_TYPE: podman
      PODMAN_SOCKET_PATH: /run/podman/podman.sock
      ORCHESTRATOR_EGRESS_NETWORK: arsenale-net-egress
      ORCHESTRATOR_EDGE_NETWORK: arsenale-net-edge
      ORCHESTRATOR_DB_NETWORK: arsenale-net-db
      ORCHESTRATOR_GUACD_NETWORK: arsenale-net-guacd
      ORCHESTRATOR_GATEWAY_NETWORK: arsenale-net-gateway
      ORCHESTRATOR_SSH_GATEWAY_IMAGE: localhost/arsenale_ssh-gateway:latest
      ORCHESTRATOR_GUACD_IMAGE: localhost/arsenale_guacd:latest
      ORCHESTRATOR_GUACD_TLS_CERT: /certs/guacd/server-cert.pem
      ORCHESTRATOR_GUACD_TLS_KEY: /certs/guacd/server-key.pem
      ORCHESTRATOR_DB_PROXY_IMAGE: localhost/arsenale_db-proxy:latest
      ORCHESTRATOR_DNS_SERVERS: 192.168.254.1,192.168.254.3
      ORCHESTRATOR_RESOLV_CONF_PATH: /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/orchestrator/resolv.conf
      SPIFFE_TRUST_DOMAIN: arsenale.local
      DEV_BOOTSTRAP_ADMIN_EMAIL: admin@example.com
      DEV_BOOTSTRAP_ADMIN_USERNAME: admin
      DEV_BOOTSTRAP_ADMIN_PASSWORD: DevAdmin123!
      DEV_BOOTSTRAP_TENANT_NAME: Development Environment
      DEV_TUNNEL_CERT_DIR: /certs
      DEV_SAMPLE_POSTGRES_HOST: dev-demo-postgres
      DEV_SAMPLE_POSTGRES_PORT: '5432'
      DEV_SAMPLE_POSTGRES_DATABASE: arsenale_demo
      DEV_SAMPLE_POSTGRES_USER: demo_pg_user
      DEV_SAMPLE_POSTGRES_PASSWORD: DemoPgPass123!
      DEV_SAMPLE_POSTGRES_SSL_MODE: disable
      DEV_SAMPLE_MYSQL_HOST: dev-demo-mysql
      DEV_SAMPLE_MYSQL_PORT: '3306'
      DEV_SAMPLE_MYSQL_DATABASE: arsenale_demo
      DEV_SAMPLE_MYSQL_USER: demo_mysql_user
      DEV_SAMPLE_MYSQL_PASSWORD: DemoMySqlPass123!
      DEV_SAMPLE_MONGODB_HOST: dev-demo-mongodb
      DEV_SAMPLE_MONGODB_PORT: '27017'
      DEV_SAMPLE_MONGODB_DATABASE: arsenale_demo
      DEV_SAMPLE_MONGODB_USER: demo_mongo_user
      DEV_SAMPLE_MONGODB_PASSWORD: DemoMongoPass123!
      DEV_SAMPLE_ORACLE_HOST: dev-demo-oracle
      DEV_SAMPLE_ORACLE_PORT: '1521'
      DEV_SAMPLE_ORACLE_SERVICE_NAME: FREEPDB1
      DEV_SAMPLE_ORACLE_USER: demo_oracle_user
      DEV_SAMPLE_ORACLE_PASSWORD: DemoOraclePass123!
      DEV_SAMPLE_MSSQL_HOST: dev-demo-mssql
      DEV_SAMPLE_MSSQL_PORT: '1433'
      DEV_SAMPLE_MSSQL_DATABASE: ArsenaleDemo
      DEV_SAMPLE_MSSQL_USER: demo_mssql_user
      DEV_SAMPLE_MSSQL_PASSWORD: DemoMssqlPass123!
      DRIVE_BASE_PATH: /guacd-drive
      FILE_UPLOAD_MAX_SIZE: '10485760'
      USER_DRIVE_QUOTA: '104857600'
      DATABASE_URL_FILE: /run/secrets/database_url
      DATABASE_SSL_ROOT_CERT: /certs/postgres/ca.pem
      REDIS_URL: redis://redis:6379/0
      ARSENALE_INSTALLER_ENABLED: ${ARSENALE_INSTALLER_ENABLED:-false}
      ARSENALE_INSTALL_MODE: ${ARSENALE_INSTALL_MODE:-development}
      ARSENALE_INSTALL_BACKEND: ${ARSENALE_INSTALL_BACKEND:-podman}
      ARSENALE_INSTALL_CAPABILITIES: ${ARSENALE_INSTALL_CAPABILITIES:-core,keychain,connections,databases,recordings,zero_trust,agentic_ai,enterprise_auth,sharing_approvals,cli}
      ARSENALE_DIRECT_ROUTING_ENABLED: ${ARSENALE_DIRECT_ROUTING_ENABLED:-true}
      ARSENALE_ZERO_TRUST_ENABLED: ${ARSENALE_ZERO_TRUST_ENABLED:-true}
      FEATURE_CONNECTIONS_ENABLED: ${FEATURE_CONNECTIONS_ENABLED:-true}
      FEATURE_DATABASE_PROXY_ENABLED: ${FEATURE_DATABASE_PROXY_ENABLED:-true}
      FEATURE_KEYCHAIN_ENABLED: ${FEATURE_KEYCHAIN_ENABLED:-true}
      FEATURE_RECORDINGS_ENABLED: ${FEATURE_RECORDINGS_ENABLED:-true}
      FEATURE_ZERO_TRUST_ENABLED: ${FEATURE_ZERO_TRUST_ENABLED:-true}
      FEATURE_AGENTIC_AI_ENABLED: ${FEATURE_AGENTIC_AI_ENABLED:-true}
      FEATURE_ENTERPRISE_AUTH_ENABLED: ${FEATURE_ENTERPRISE_AUTH_ENABLED:-true}
      FEATURE_SHARING_APPROVALS_ENABLED: ${FEATURE_SHARING_APPROVALS_ENABLED:-true}
      GATEWAY_ROUTING_MODE: ${GATEWAY_ROUTING_MODE:-gateway-mandatory}
      ALLOW_EXTERNAL_SHARING: ${ALLOW_EXTERNAL_SHARING:-false}
      CLI_ENABLED: ${CLI_ENABLED:-true}
      RECORDING_ENABLED: 'true'
      RECORDING_PATH: /recordings
      GUACAMOLE_SECRET_FILE: /run/secrets/guacamole_secret
      GUACENC_AUTH_TOKEN_FILE: /run/secrets/guacenc_auth_token
      GUACENC_SERVICE_URL: https://guacenc:3003
      GUACENC_USE_TLS: 'true'
      GUACENC_TLS_CA: /certs/guacenc/ca.pem
      GUACENC_TIMEOUT_MS: '120000'
      GUACENC_RECORDING_PATH: /recordings
      ASCIICAST_CONVERTER_URL: https://guacenc:3003
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      SERVER_ENCRYPTION_KEY_FILE: /run/secrets/server_encryption_key
      GATEWAY_GRPC_TLS_CA: /certs/ca.pem
      GATEWAY_GRPC_CLIENT_CA: /certs/ssh-gateway/client-ca.pem
      GATEWAY_GRPC_TLS_CERT: /certs/ssh-gateway/client-cert.pem
      GATEWAY_GRPC_TLS_KEY: /certs/ssh-gateway/client-key.pem
      GATEWAY_GRPC_SERVER_CERT: /certs/ssh-gateway/server-cert.pem
      GATEWAY_GRPC_SERVER_KEY: /certs/ssh-gateway/server-key.pem
    ports:
    - 127.0.0.1:18080:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
    - arsenale_drive:/guacd-drive
    - arsenale_recordings:/recordings
    - /run/user/1000/podman/podman.sock:/run/podman/podman.sock
    - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/ca.pem:/certs/ca.pem:ro
    - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/guacd:/certs/guacd:ro
    - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/ssh-gateway:/certs/ssh-gateway:ro
    - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/ca-key.pem:/certs/ca-key.pem:ro
    - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/postgres:/certs/postgres:ro
    - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/guacenc:/certs/guacenc:ro
    - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/tunnel-managed-ssh:/certs/tunnel-managed-ssh:ro
    - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/tunnel-guacd:/certs/tunnel-guacd:ro
    - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/tunnel-db-proxy:/certs/tunnel-db-proxy:ro
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: always
    networks:
    - net-edge
    - net-db
    - net-cache
    - net-guacd
    - net-gateway
  control-plane-controller:
    build:
      context: /home/debian/repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: backend/Dockerfile
      args:
        SERVICE: control-plane-controller
    container_name: arsenale-control-plane-controller
    read_only: true
    cpus: '0.5'
    mem_limit: 512m
    pids_limit: 128
    tmpfs:
    - /tmp
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    secrets:
    - database_url
    environment:
      PORT: '8081'
      ARSENALE_VERSION: latest
      DATABASE_URL_FILE: /run/secrets/database_url
      DATABASE_SSL_ROOT_CERT: /certs/postgres/ca.pem
      RUNTIME_AGENT_URL: http://runtime-agent:8095
    ports:
    - 127.0.0.1:18081:8081
    depends_on:
      postgres:
        condition: service_healthy
      runtime-agent:
        condition: service_healthy
    volumes:
    - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/postgres:/certs/postgres:ro
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://127.0.0.1:8081/healthz >/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: always
    networks:
    - net-edge
    - net-db
  authz-pdp:
    build:
      context: /home/debian/repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: backend/Dockerfile
      args:
        SERVICE: authz-pdp
    container_name: arsenale-authz-pdp
    read_only: true
    cpus: '0.5'
    mem_limit: 512m
    pids_limit: 128
    tmpfs:
    - /tmp
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    environment:
      PORT: '8082'
      ARSENALE_VERSION: latest
    ports:
    - 127.0.0.1:18082:8082
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://127.0.0.1:8082/healthz >/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: always
    networks:
    - net-edge
  model-gateway:
    build:
      context: /home/debian/repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: backend/Dockerfile
      args:
        SERVICE: model-gateway
    container_name: arsenale-model-gateway
    read_only: true
    cpus: '0.5'
    mem_limit: 512m
    pids_limit: 128
    tmpfs:
    - /tmp
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    secrets:
    - database_url
    - server_encryption_key
    environment:
      PORT: '8083'
      ARSENALE_VERSION: latest
      DATABASE_URL_FILE: /run/secrets/database_url
      DATABASE_SSL_ROOT_CERT: /certs/postgres/ca.pem
      SERVER_ENCRYPTION_KEY_FILE: /run/secrets/server_encryption_key
    ports:
    - 127.0.0.1:18083:8083
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
    - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/postgres:/certs/postgres:ro
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://127.0.0.1:8083/healthz >/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: always
    networks:
    - net-edge
    - net-db
  terminal-broker:
    build:
      context: /home/debian/repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: backend/Dockerfile
      args:
        SERVICE: terminal-broker
    container_name: arsenale-terminal-broker
    read_only: true
    cpus: '0.5'
    mem_limit: 512m
    pids_limit: 128
    tmpfs:
    - /tmp
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    secrets:
    - database_url
    - guacamole_secret
    environment:
      PORT: '8090'
      ARSENALE_VERSION: latest
      DATABASE_URL_FILE: /run/secrets/database_url
      DATABASE_SSL_ROOT_CERT: /certs/postgres/ca.pem
      GUACAMOLE_SECRET_FILE: /run/secrets/guacamole_secret
    ports:
    - 127.0.0.1:18090:8090
    depends_on:
      postgres:
        condition: service_healthy
      terminal-target:
        condition: service_healthy
    volumes:
    - arsenale_recordings:/recordings
    - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/postgres:/certs/postgres:ro
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://127.0.0.1:8090/healthz >/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: always
    networks:
    - net-edge
    - net-db
  tunnel-broker:
    build:
      context: /home/debian/repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: backend/Dockerfile
      args:
        SERVICE: tunnel-broker
    image: ghcr.io/dnviti/arsenale/tunnel-broker-go:latest
    container_name: arsenale-tunnel-broker
    read_only: true
    cpus: '0.5'
    mem_limit: 256m
    pids_limit: 128
    tmpfs:
    - /tmp
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    secrets:
    - database_url
    - server_encryption_key
    environment:
      PORT: '8092'
      ARSENALE_VERSION: latest
      DATABASE_URL_FILE: /run/secrets/database_url
      DATABASE_SSL_ROOT_CERT: /certs/postgres/ca.pem
      SERVER_ENCRYPTION_KEY_FILE: /run/secrets/server_encryption_key
      SPIFFE_TRUST_DOMAIN: arsenale.local
      TUNNEL_TCP_PROXY_BIND_HOST: 0.0.0.0
      TUNNEL_TCP_PROXY_ADVERTISE_HOST: tunnel-broker
    ports:
    - 127.0.0.1:18092:8092
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
    - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/postgres:/certs/postgres:ro
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://127.0.0.1:8092/healthz >/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: always
    networks:
    - net-edge
    - net-db
    - net-gateway
  tool-gateway:
    build:
      context: /home/debian/repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: backend/Dockerfile
      args:
        SERVICE: tool-gateway
    container_name: arsenale-tool-gateway
    read_only: true
    cpus: '0.5'
    mem_limit: 512m
    pids_limit: 128
    tmpfs:
    - /tmp
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    environment:
      PORT: '8084'
      ARSENALE_VERSION: latest
      TERMINAL_BROKER_URL: http://terminal-broker:8090
      PUBLIC_TERMINAL_BROKER_URL: ws://127.0.0.1:18090
      QUERY_RUNNER_URL: http://query-runner:8093
      MEMORY_SERVICE_URL: http://memory-service:8086
    ports:
    - 127.0.0.1:18084:8084
    depends_on:
      terminal-broker:
        condition: service_healthy
      query-runner:
        condition: service_healthy
      memory-service:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://127.0.0.1:8084/healthz >/dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: always
    networks:
    - net-edge
  query-runner:
    build:
      context: /home/debian/repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: backend/Dockerfile
      args:
        SERVICE: query-runner
    container_name: arsenale-query-runner
    read_only: true
    cpus: '0.5'
    mem_limit: 512m
    pids_limit: 128
    tmpfs:
    - /tmp
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    secrets:
    - database_url
    environment:
      PORT: '8093'
      ARSENALE_VERSION: latest
      DATABASE_URL_FILE: /run/secrets/database_url
      DATABASE_SSL_ROOT_CERT: /certs/postgres/ca.pem
    ports:
