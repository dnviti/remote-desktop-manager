  dev-debian-ssh-target:
    build:
      context: /home/debian/repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: infrastructure/dev/debian-ssh-target/Dockerfile
    container_name: arsenale-dev-debian-ssh-target
    cpus: "0.5"
    mem_limit: "128m"
    pids_limit: 128
    tmpfs:
      - /tmp
      - /run
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 22 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always
    networks:
      net-edge: {}
      net-gateway:
        aliases:
          - dev-debian-target
          - dev-debian-ssh-target

  # ---------------------------------------------------------------------------
  # Client — React SPA served by Nginx
  # ---------------------------------------------------------------------------
  client:
    build:
      context: /home/debian/repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: client/Dockerfile
    container_name: arsenale-client
    read_only: true
    cpus: "0.75"
    mem_limit: "256m"
    pids_limit: 256
    tmpfs:
      - /tmp
      - /run
      - /var/cache/nginx
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:3000:8080"
    volumes:
      - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/client:/certs:ro
      - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../client/nginx.dev.conf:/etc/nginx/templates/default.conf.template:ro
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --show-error --fail --insecure https://localhost:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      control-plane-api:
        condition: service_healthy
      desktop-broker:
        condition: service_healthy
    restart: always
    networks:
      - net-edge

  # ---------------------------------------------------------------------------
  # SSH Gateway — Managed SSH tunnel for TCP port forwarding
  # ---------------------------------------------------------------------------
  ssh-gateway:
    build:
      context: /home/debian/repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: gateways/ssh-gateway/Dockerfile
    container_name: arsenale-ssh-gateway
    read_only: true
    cpus: "0.5"
    mem_limit: "256m"
    pids_limit: 128
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      SPIFFE_TRUST_DOMAIN: "arsenale.local"
      GATEWAY_API_TLS_CERT: /certs/server-cert.pem
      GATEWAY_API_TLS_KEY: /certs/server-key.pem
      GATEWAY_GRPC_TLS_CA: /certs/ca.pem
      GATEWAY_GRPC_CLIENT_CA: /certs/client-ca.pem
      GATEWAY_GRPC_TLS_CERT: /certs/server-cert.pem
      GATEWAY_GRPC_TLS_KEY: /certs/server-key.pem
      GATEWAY_GRPC_EXPECTED_SPIFFE_ID: "spiffe://arsenale.local/service/control-plane-api"
    volumes:
      - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../config/ssh-gateway/authorized_keys:/config/authorized_keys:ro
      - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/ssh-gateway:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2222 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always
    networks:
      - net-gateway


  # ---------------------------------------------------------------------------
  # Development tunnel gateways — end-to-end tunnel registration fixtures
  # ---------------------------------------------------------------------------
  dev-tunnel-ssh-gateway:
    build:
      context: /home/debian/repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: gateways/ssh-gateway/Dockerfile
    container_name: arsenale-dev-tunnel-ssh-gateway
    read_only: true
    cpus: "0.5"
    mem_limit: "256m"
    pids_limit: 128
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      SPIFFE_TRUST_DOMAIN: "arsenale.local"
      TUNNEL_SERVER_URL: "ws://tunnel-broker:8092/api/tunnel/connect"
      TUNNEL_TOKEN: "${DEV_TUNNEL_MANAGED_SSH_TOKEN}"
      TUNNEL_GATEWAY_ID: "${DEV_TUNNEL_MANAGED_SSH_GATEWAY_ID}"
      TUNNEL_LOCAL_HOST: "127.0.0.1"
      TUNNEL_LOCAL_PORT: "2222"
      TUNNEL_CA_CERT_FILE: /tunnel-certs/ca.pem
      TUNNEL_CLIENT_CERT_FILE: /tunnel-certs/client-cert.pem
      TUNNEL_CLIENT_KEY_FILE: /tunnel-certs/client-key.pem
      GATEWAY_GRPC_TLS_CA: /certs/ca.pem
      GATEWAY_GRPC_CLIENT_CA: /certs/client-ca.pem
      GATEWAY_GRPC_TLS_CERT: /certs/server-cert.pem
      GATEWAY_GRPC_TLS_KEY: /certs/server-key.pem
      GATEWAY_GRPC_EXPECTED_SPIFFE_ID: "spiffe://arsenale.local/service/control-plane-api"
    volumes:
      - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../config/ssh-gateway/authorized_keys:/config/authorized_keys:ro
      - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/ssh-gateway:/certs:ro
      - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/tunnel-managed-ssh:/tunnel-certs:ro
    depends_on:
      tunnel-broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2222 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always
    dns:
      - "192.168.254.1"
      - "192.168.254.3"
    networks:
      - net-egress
      - net-gateway

