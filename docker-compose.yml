      - net-db

  memory-service:
    build:
      context: /home/debian/repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: backend/Dockerfile
      args:
        SERVICE: memory-service
    container_name: arsenale-memory-service
    read_only: true
    cpus: "0.5"
    mem_limit: "512m"
    pids_limit: 128
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    secrets:
      - database_url
    environment:
      PORT: "8086"
      ARSENALE_VERSION: "latest"
      DATABASE_URL_FILE: /run/secrets/database_url
      DATABASE_SSL_ROOT_CERT: /certs/postgres/ca.pem
    ports:
      - "127.0.0.1:18086:8086"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /home/debian/repos/arsenale/deployment/ansible/playbooks/../../../dev-certs/postgres:/certs/postgres:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8086/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: always
    networks:
      - net-edge
      - net-db

  agent-orchestrator:
    build:
      context: /home/debian/repos/arsenale/deployment/ansible/playbooks/../../..
