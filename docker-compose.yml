  terminal-target:
    build:
      context: /home/debian/repos/arsenale/deployment/ansible/playbooks/../../..
      dockerfile: infrastructure/dev/terminal-target/Dockerfile
    container_name: arsenale-terminal-target
    read_only: true
    cpus: "0.5"
    mem_limit: "128m"
    pids_limit: 128
    tmpfs:
      - /tmp
      - /run
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 2224 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: always
    networks:
      net-edge: {}
      net-gateway:
