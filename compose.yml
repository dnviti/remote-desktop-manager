services:
  postgres:
    image: postgres:16
    security_opt:
      - label:disable
    env_file:
      - .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-arsenale} -d ${POSTGRES_DB:-arsenale}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - arsenale_net

  guacd:
    image: ${ORCHESTRATOR_GUACD_IMAGE:-guacamole/guacd:1.6.0}
    security_opt:
      - label:disable
    volumes:
      - arsenale_drive:/guacd-drive
      - arsenale_recordings:/recordings
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4822 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - arsenale_net

  guacenc:
    build:
      context: gateways/guacenc
      dockerfile: Dockerfile
    security_opt:
      - label:disable
    volumes:
      - arsenale_recordings:/recordings
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:3003/health')\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - arsenale_net

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    user: "0:0" # rootless Podman maps UID 0 → host user (socket owner)
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - label:disable
      - no-new-privileges:true
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      guacd:
        condition: service_healthy
    env_file:
      - .env.prod
    volumes:
      - arsenale_drive:/guacd-drive
      - arsenale_recordings:/recordings
      - /run/user/1000/podman/podman.sock:/run/user/1000/podman/podman.sock
    restart: always
    networks:
      - arsenale_net

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    security_opt:
      - label:disable
    ports:
      - "3000:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      server:
        condition: service_healthy
    restart: always
    networks:
      - arsenale_net

  # SSH Gateway (optional — remove or comment out if not needed)
  # For multiple gateways, duplicate with different names and ports:
  #   ssh-gateway-dmz:  ports: ["2222:2222"]
  #   ssh-gateway-lan:  ports: ["2223:2222"]
  ssh-gateway:
    build:
      context: .
      dockerfile: gateways/ssh-gateway/Dockerfile
    security_opt:
      - label:disable
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost ${SSH_PORT:-2222} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    env_file:
      - .env.prod
    volumes:
      - ./config/ssh-gateway/authorized_keys:/config/authorized_keys:ro,z
    restart: always
    networks:
      - arsenale_net

volumes:
  pgdata:
  arsenale_drive:
  arsenale_recordings:

networks:
  arsenale_net:
    name: arsenale_net
