name: "Arsenale CodeQL Config"

# These exclusions document known false positives in the JavaScript/TypeScript
# workspaces. The live application edge now runs in Go; JS/TS scanning covers
# the client, browser extension, and archived reference code.
query-filters:
  - exclude:
      id: js/missing-token-validation
  # js/log-injection is a false positive: Arsenale sanitizes log output before
  # writing it, but CodeQL cannot fully track the custom sanitization path.
  - exclude:
      id: js/log-injection
  # js/sql-injection is excluded for the archived admin-query code path because
  # authenticated users intentionally execute SQL in a constrained database tool.
  - exclude:
      id: js/sql-injection
  # js/regex-injection is excluded for the policy editor because the feature
  # intentionally accepts administrator-supplied regex with safety validation.
  - exclude:
      id: js/regex-injection
