name: "Arsenale CodeQL Config"

# js/missing-token-validation is a false positive: the app implements CSRF
# protection via a custom double-submit-cookie middleware (server/src/middleware/csrf.middleware.ts)
# applied globally to all state-changing /api routes in app.ts lines 98-105.
# CodeQL only recognises session-based libraries (lusca, csurf) which are
# incompatible with JWT-based authentication.
query-filters:
  - exclude:
      id: js/missing-token-validation
  # js/log-injection is a false positive: all logging goes through the centralized
  # logger (server/src/utils/logger.ts) which strips newlines via stripNewlines()
  # and formatArgs().replace(/[\n\r]/g, '\\n') before any console output. CodeQL
  # cannot track taint through custom sanitizer functions.
  - exclude:
      id: js/log-injection
  # js/sql-injection in dbQueryExecutor.service.ts is by design: this is a database
  # admin tool where authenticated users execute SQL queries. Security is enforced
  # upstream: role-based query restriction (SELECT-only for non-operators) and
  # sqlFirewall.evaluateQuery() in dbSession.service.ts validate all queries before
  # they reach the executor. Parameterized queries are not applicable for dynamic
  # schema exploration (table names, column names are part of the SQL structure).
  - exclude:
      id: js/sql-injection
