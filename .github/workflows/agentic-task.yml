# Agentic Fleet — Task Implementation Pipeline
# Generated by claude-task-development-framework
#
# Manually triggered to pick up the highest-priority pending task,
# implement it autonomously, and open a Pull Request for human review.
#
# Pipeline: Python static analysis → Opus 4.6 implements the task.
# Fully headless — all decisions made by the model, no user interaction.
#
# Required secrets:
#   ANTHROPIC_API_KEY — Claude API key for agent invocations

name: "Agentic Fleet — Task Implementation"

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: agentic-task
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Build memory + static analysis (Python, zero tokens) ────────
  build-and-analyze:
    name: Build Memory & Analyze
    # Note: schedule always runs on default branch (main), but we check out
    # develop explicitly. No branch guard needed — the checkout ref is the control.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate codebase summary and analysis reports
        run: |
          python3 .claude/scripts/memory_builder.py generate \
            --output project-memory.md \
            --max-depth 4
          python3 .claude/scripts/codebase_analyzer.py analyze \
            --output-dir . \
            --memory project-memory.md

      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fleet-analysis
          path: |
            project-memory.md
            report-infrastructure.md
            report-features.md
            report-quality.md
          retention-days: 1

  # ── Job 2: Opus 4.6 — headless task implementation ────────────────────
  implement:
    name: "Implement Task (Opus 4.6)"
    needs: build-and-analyze
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "agentic-fleet[bot]"
          git config user.email "agentic-fleet[bot]@users.noreply.github.com"

      - name: Download analysis artifacts
        uses: actions/download-artifact@v4
        with:
          name: fleet-analysis

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install CTDF plugin
        run: |
          PLUGIN_DIR="$HOME/.claude/plugins"
          MARKET_DIR="$PLUGIN_DIR/marketplaces/dnviti-plugins"
          mkdir -p "$PLUGIN_DIR/marketplaces"

          git clone --depth 1 https://github.com/dnviti/claude-task-development-framework.git "$MARKET_DIR"

          CTDF_VERSION=$(python3 -c "import json; print(json.load(open('$MARKET_DIR/.claude-plugin/plugin.json'))['version'])")
          CACHE_DIR="$PLUGIN_DIR/cache/dnviti-plugins/ctdf/$CTDF_VERSION"
          mkdir -p "$CACHE_DIR"
          cp -r "$MARKET_DIR/." "$CACHE_DIR/"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)

          echo "{\"version\":2,\"plugins\":{\"ctdf@dnviti-plugins\":[{\"scope\":\"user\",\"installPath\":\"$CACHE_DIR\",\"version\":\"$CTDF_VERSION\",\"installedAt\":\"$NOW\",\"lastUpdated\":\"$NOW\"}]}}" > "$PLUGIN_DIR/installed_plugins.json"

          echo "{\"dnviti-plugins\":{\"source\":{\"source\":\"git\",\"url\":\"https://github.com/dnviti/claude-task-development-framework.git\"},\"installLocation\":\"$MARKET_DIR\",\"lastUpdated\":\"$NOW\"}}" > "$PLUGIN_DIR/known_marketplaces.json"

          # Enable the plugin in Claude Code settings
          SETTINGS_FILE="$HOME/.claude/settings.json"
          if [ -f "$SETTINGS_FILE" ]; then
            python3 -c "
          import json
          with open('$SETTINGS_FILE') as f: s = json.load(f)
          s.setdefault('enabledPlugins', {})['ctdf@dnviti-plugins'] = True
          with open('$SETTINGS_FILE', 'w') as f: json.dump(s, f)
          "
          else
            echo "{\"enabledPlugins\":{\"ctdf@dnviti-plugins\":true}}" > "$SETTINGS_FILE"
          fi

      - name: Run Opus task implementation agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENTIC_AUTO_PR: ${{ vars.AGENTIC_AUTO_PR || 'true' }}
        run: |
          # Build PR section conditionally
          if [ "$AGENTIC_AUTO_PR" = "true" ] || [ "$AGENTIC_AUTO_PR" = "1" ]; then
            PR_SECTION='
          16. Check for existing PR (avoid duplicates):
              ```bash
              gh pr list --head task/<task-code-lowercase> --state open --json number,url
              ```
              If a PR already exists, skip creation.

          17. Create the Pull Request. Include the testing guide IN the PR body:
              ```bash
              gh pr create \
                --base <RELEASE_BRANCH> \
                --head task/<task-code-lowercase> \
                --title "[<TASK-CODE>] — <Task Title>" \
                --body "## Task <TASK-CODE> — <Task Title>

              ### Summary
              <brief list of what was created/modified>

              ### Verify Command Result
              <PASS or FAIL with details>

              ### Testing Guide
              <concrete numbered steps to manually verify the implementation,
               including prerequisites, setup, expected behavior, and edge cases>

              ### Related Issue
              Refs #<ISSUE_NUM> (<TASK-CODE>)

              ---
              *Implemented autonomously by Agentic Fleet (Opus 4.6)*"
              ```'
          else
            PR_SECTION='
          16. Skip PR creation — auto_pr is disabled. The branch has been pushed; a human will create the PR manually.'
          fi

          cat > /tmp/agent-prompt.md << PROMPT_EOF
          You are a fully autonomous task implementation agent. You operate
          headlessly — make ALL decisions yourself with no user interaction.
          Never use AskUserQuestion. Never wait for confirmation. Act decisively.

          ## Context Files
          Read these files for deep codebase understanding:
          - @project-memory.md — structural codebase summary
          - @report-infrastructure.md — infrastructure analysis
          - @report-features.md — feature analysis
          - @report-quality.md — code quality analysis

          ## Live Progress Updates (Issue Comments)

          Throughout your work, post real-time status comments on the GitHub
          issue to document your reasoning and progress. This creates a
          transparent log of what was done and why, like a team member
          updating the ticket as they work.

          **When to comment on the issue:**
          - After selecting the task: what you picked and why
          - After reading the codebase: your implementation plan and approach
          - During implementation: key decisions, trade-offs, patterns you followed
          - If you hit a problem: what went wrong, how you resolved it
          - After verify passes/fails: the result and any fixes applied
          - After delivery: summary of what was done, link to PR/branch

          **How to comment:**
          ```bash
          gh issue comment <ISSUE_NUM> --body "<your update>"
          ```

          **Comment style:** Write naturally, like a developer updating their
          team. Be specific about files changed and decisions made. Use
          markdown formatting. Keep each comment focused on one phase/decision.
          Prefix each comment with a phase emoji:
          - 🔍 for task selection and analysis
          - 📋 for implementation planning
          - 🔨 for implementation progress
          - ⚠️ for problems encountered
          - ✅ for verification results
          - 🚀 for delivery

          ## Your Mission

          ### Phase 1: Select a Task

          1. Read CLAUDE.md to understand the project's architecture, development
             commands (especially VERIFY_COMMAND and RELEASE_BRANCH), and patterns.

          2. Detect the operating mode:
             ```bash
             python3 .claude/scripts/task_manager.py platform-config
             ```

          3. List pending tasks:
             - Local/dual mode: \`python3 .claude/scripts/task_manager.py list --status todo --format summary\`
             - Platform-only mode: use \`gh issue list\` with \`status:todo\` label

          4. If NO pending tasks exist, output "No pending tasks found." and stop.

          5. Select the highest-priority task:
             - Priority order: HIGH → MEDIUM → LOW
             - Within same priority, pick the lowest-numbered task code
             - Skip tasks whose dependencies are not yet in done status

          6. Parse the full task details:
             - Local/dual: \`python3 .claude/scripts/task_manager.py parse <TASK-CODE>\`
             - Platform-only: \`gh issue view <ISSUE_NUM> --json body\`

          7. **Post a comment on the issue** explaining which task you selected and why.

          ### Phase 2: Prepare

          8. Mark the task as in-progress:
             - Local/dual: \`python3 .claude/scripts/task_manager.py move <TASK-CODE> --to progressing\`
             - Platform-only: update issue labels (remove status:todo, add status:in-progress)

          9. Determine the release branch from CLAUDE.md RELEASE_BRANCH.
             Default: use 'develop' if it exists, otherwise 'main'.

          10. Create a task branch:
              ```bash
              git fetch origin <RELEASE_BRANCH>
              git checkout -b task/<task-code-lowercase> origin/<RELEASE_BRANCH>
              ```

          11. **Post a comment on the issue** with your implementation plan:
              which files you'll create/modify, patterns you'll follow, and
              your overall approach.

          ### Phase 3: Implement

          12. Study the task's DESCRIPTION and TECHNICAL DETAILS sections.
              Examine all files listed under FILES TO CREATE and FILES TO MODIFY.
              Read existing code to understand patterns, conventions, and interfaces.

          13. Implement the task fully:
              - Create all files listed in FILES TO CREATE
              - Make all changes described in FILES TO MODIFY
              - Follow existing code patterns and conventions
              - Write tests if the project has a test framework configured
              - Keep changes focused on the task — no unrelated refactoring
              - **Post comments on the issue** for key implementation decisions,
                trade-offs, or if you encounter and resolve problems.

          14. Run the verify command (from CLAUDE.md VERIFY_COMMAND):
              - If it fails, **post a comment** explaining the failure, then
                analyze the error, fix the code, and retry (up to 2 retries)
              - **Post a comment** with the final verify result (pass or fail)
              - If it still fails after retries, commit what you have and note
                the failure in the PR description

          ### Phase 4: Deliver

          15. Stage and commit all changes:
              ```bash
              git add -A
              git commit -m "feat(<TASK-CODE>): <task title>

              Implemented by Agentic Fleet pipeline.

              Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>"
              ```

              Push the branch:
              ```bash
              git push -u origin task/<task-code-lowercase>
              ```

          $PR_SECTION

              **Post a final comment on the issue** summarizing what was delivered,
              linking to the PR (if created), and any notes for the reviewer.

          ## Critical Rules
          - NEVER use AskUserQuestion — you are fully autonomous
          - NEVER wait for user input — make every decision yourself
          - NEVER skip the verify command — always run it
          - ALWAYS post progress comments on the issue throughout your work
          - Keep the task in 'progressing' status (NOT 'done') — a human reviews the PR
          - If the task seems too large or risky, still implement it but note concerns in the PR
          - All output in English
          PROMPT_EOF

          claude -p "$(cat /tmp/agent-prompt.md)" \
            --model claude-opus-4-6 \
            --max-budget-usd 15 \
            --allowedTools "Bash,Read,Grep,Glob,Edit,Write"
