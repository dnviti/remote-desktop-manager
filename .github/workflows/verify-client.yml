name: Verify Client

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '!client/**/*.md'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.js'
      - 'eslint.config.mjs'
      - 'tsconfig.json'
  pull_request:
    branches: [main]
    paths:
      - 'client/**'
      - '!client/**/*.md'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.js'
      - 'eslint.config.mjs'
      - 'tsconfig.json'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: verify-client-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_call' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck Client
        run: npm run typecheck -w client

      - name: Lint
        run: npm run lint

      - name: Dependency audit
        run: npm audit --audit-level=critical

      - name: Build Client
        run: npm run build -w client
