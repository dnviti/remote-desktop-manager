name: Docker Server

on:
  push:
    tags: ['v*']
    branches: [main]
    paths:
      - 'server/**'
      - '!server/**/*.md'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.js'
      - 'eslint.config.mjs'
      - 'tsconfig.json'
  pull_request:
    branches: [main, staging]
    paths:
      - 'server/**'
      - '!server/**/*.md'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.js'
      - 'eslint.config.mjs'
      - 'tsconfig.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io

jobs:
  verify:
    uses: ./.github/workflows/verify-server.yml
    permissions:
      contents: read

  security:
    uses: ./.github/workflows/security-server.yml
    permissions:
      contents: read
      security-events: write

  build-and-scan:
    needs: [verify, security]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/server
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./server/Dockerfile
          push: false
          load: true
          tags: arsenale-server:scan
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: arsenale-server:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-server

      - name: Push to registry
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=server
