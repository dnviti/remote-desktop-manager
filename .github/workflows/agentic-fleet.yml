# Agentic Fleet — Idea Scout Pipeline
# Generated by claude-task-development-framework
#
# Triggered when a GitHub Release is published. Python static analysis
# replaces Sonnet reader agents, then Sonnet 4.6 runs /idea-scout.
#
# Required secrets:
#   ANTHROPIC_API_KEY — Claude API key for agent invocations

name: "Agentic Fleet — Idea Scout"

on:
  # release:
  #   types: [published]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: agentic-fleet
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Build memory + static analysis (Python, zero tokens) ────────
  build-and-analyze:
    name: Build Memory & Analyze
    if: github.event.release.target_commitish == 'develop' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate codebase summary and analysis reports
        run: |
          python3 .claude/scripts/memory_builder.py generate \
            --output project-memory.md \
            --max-depth 4
          python3 .claude/scripts/codebase_analyzer.py analyze \
            --output-dir . \
            --memory project-memory.md

      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fleet-analysis
          path: |
            project-memory.md
            report-infrastructure.md
            report-features.md
            report-quality.md
          retention-days: 1

  # ── Job 2: Sonnet 4.6 — idea scout with full context ────────────────────
  scout:
    name: "Scout Ideas (Sonnet 4.6)"
    needs: build-and-analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: develop

      - name: Download analysis artifacts
        uses: actions/download-artifact@v4
        with:
          name: fleet-analysis

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install CTDF plugin
        run: |
          PLUGIN_DIR="$HOME/.claude/plugins"
          MARKET_DIR="$PLUGIN_DIR/marketplaces/dnviti-plugins"
          mkdir -p "$PLUGIN_DIR/marketplaces"

          git clone --depth 1 https://github.com/dnviti/claude-task-development-framework.git "$MARKET_DIR"

          CTDF_VERSION=$(python3 -c "import json; print(json.load(open('$MARKET_DIR/.claude-plugin/plugin.json'))['version'])")
          CACHE_DIR="$PLUGIN_DIR/cache/dnviti-plugins/ctdf/$CTDF_VERSION"
          mkdir -p "$CACHE_DIR"
          cp -r "$MARKET_DIR/." "$CACHE_DIR/"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)

          echo "{\"version\":2,\"plugins\":{\"ctdf@dnviti-plugins\":[{\"scope\":\"user\",\"installPath\":\"$CACHE_DIR\",\"version\":\"$CTDF_VERSION\",\"installedAt\":\"$NOW\",\"lastUpdated\":\"$NOW\"}]}}" > "$PLUGIN_DIR/installed_plugins.json"

          echo "{\"dnviti-plugins\":{\"source\":{\"source\":\"git\",\"url\":\"https://github.com/dnviti/claude-task-development-framework.git\"},\"installLocation\":\"$MARKET_DIR\",\"lastUpdated\":\"$NOW\"}}" > "$PLUGIN_DIR/known_marketplaces.json"

          # Enable the plugin in Claude Code settings
          SETTINGS_FILE="$HOME/.claude/settings.json"
          if [ -f "$SETTINGS_FILE" ]; then
            python3 -c "
          import json
          with open('$SETTINGS_FILE') as f: s = json.load(f)
          s.setdefault('enabledPlugins', {})['ctdf@dnviti-plugins'] = True
          with open('$SETTINGS_FILE', 'w') as f: json.dump(s, f)
          "
          else
            echo "{\"enabledPlugins\":{\"ctdf@dnviti-plugins\":true}}" > "$SETTINGS_FILE"
          fi

      - name: Run Sonnet idea scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/scout-prompt.md << 'PROMPT_EOF'
          /idea-scout @project-memory.md @report-infrastructure.md @report-features.md @report-quality.md

          ## Additional Instructions: Research Comments

          After creating each idea issue, post a comment ON THAT IDEA ISSUE
          documenting the research that led to it. This makes the reasoning
          transparent and helps reviewers evaluate the idea.

          **For each idea you create**, immediately post a comment:
          ```bash
          gh issue comment <IDEA_ISSUE_NUM> --body "<research comment>"
          ```

          **Comment content should include:**
          - 🔍 **Sources consulted**: which online sources, reports, or codebase
            files informed this idea (with links where available)
          - 💡 **Reasoning**: why this idea is relevant to the project specifically
          - 📊 **Evidence**: trends, data points, or patterns that support the idea
          - 🔗 **Related existing work**: any existing tasks or code that this
            idea builds upon or relates to
          - ⚖️ **Trade-offs considered**: alternatives you evaluated and why
            this approach was chosen

          Write naturally, like a product strategist presenting their findings.
          Use markdown formatting. Be specific — reference actual file paths,
          endpoints, or components from the codebase analysis reports.
          PROMPT_EOF

          claude -p "$(cat /tmp/scout-prompt.md)" \
            --model claude-sonnet-4-6 \
            --max-budget-usd 5 \
            --allowedTools "Bash,Read,Grep,Glob,WebSearch,WebFetch,Edit,Write"
