# Agentic Fleet — Idea Scout Pipeline
# Generated by claude-task-development-framework
#
# Triggered when a GitHub Release is published. Spawns a fleet of Sonnet 4.6 agents
# to read and analyze the codebase, then a single Opus 4.6 agent runs
# /idea-scout to generate high-quality idea issues automatically.
#
# Required secrets:
#   ANTHROPIC_API_KEY — Claude API key for agent invocations

name: "Agentic Fleet — Idea Scout"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      focus_areas:
        description: "Comma-separated focus areas for Sonnet readers"
        required: false
        default: "infrastructure,features,quality"

permissions:
  contents: read
  issues: write

concurrency:
  group: agentic-fleet
  cancel-in-progress: true

jobs:
  # ── Job 1: Build structural codebase memory (Python only) ──────────────
  build-memory:
    name: Build Project Memory
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Generate codebase summary
        run: |
          python3 .claude/scripts/memory_builder.py generate \
            --output project-memory.md \
            --max-depth 4

      - name: Upload memory artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: project-memory
          path: project-memory.md
          retention-days: 1

  # ── Job 2: Sonnet 4.6 fleet — deep codebase reading (parallel) ─────────────
  deep-read:
    name: "Read — ${{ matrix.focus }}"
    needs: build-memory
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        focus:
          - infrastructure
          - features
          - quality
        include:
          - focus: infrastructure
            prompt: >-
              Read and analyze this entire codebase focusing on INFRASTRUCTURE
              AND ARCHITECTURE. Examine: build systems, CI/CD pipelines,
              deployment configs, Docker/container setups, dependency management,
              environment configuration, database schemas, API layer structure,
              monitoring/logging setup, and cross-cutting concerns.
              Write a detailed Markdown report to report-infrastructure.md
              covering: current architecture patterns, strengths, gaps,
              and areas where improvements could add value.
              Do NOT create ideas or issues — only analyze and report.
          - focus: features
            prompt: >-
              Read and analyze this entire codebase focusing on FEATURES AND
              USER EXPERIENCE. Examine: user-facing functionality, UI components,
              API endpoints, data flows, authentication/authorization, error
              handling UX, accessibility, internationalization, onboarding flows,
              and feature completeness relative to the project's stated goals.
              Write a detailed Markdown report to report-features.md
              covering: current feature set, user experience patterns,
              gaps, and areas where new features could add value.
              Do NOT create ideas or issues — only analyze and report.
          - focus: quality
            prompt: >-
              Read and analyze this entire codebase focusing on CODE QUALITY,
              PERFORMANCE, AND MAINTAINABILITY. Examine: test coverage, code
              duplication, complexity hotspots, error handling patterns,
              type safety, documentation quality, naming conventions,
              dependency freshness, security practices, and performance
              bottlenecks. Write a detailed Markdown report to
              report-quality.md covering: current quality posture,
              technical debt areas, and refactoring opportunities.
              Do NOT create ideas or issues — only analyze and report.
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: develop

      - name: Download project memory
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: project-memory

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Sonnet reader agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "${{ matrix.prompt }} Use @project-memory.md as structural context." \
            --model claude-sonnet-4-6 \
            --max-turns 15 \
            --allowedTools "Read,Grep,Glob,Write"

      - name: Upload focus report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: report-${{ matrix.focus }}
          path: report-${{ matrix.focus }}.md
          retention-days: 1

  # ── Job 3: Opus 4.6 — idea scout with full context ────────────────────
  scout:
    name: "Scout Ideas (Opus 4.6)"
    needs: deep-read
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: develop

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: fleet-reports

      - name: Flatten report files
        run: |
          # Move all reports to the working directory for easy @-referencing
          cp fleet-reports/project-memory/project-memory.md .
          cp fleet-reports/report-infrastructure/report-infrastructure.md .
          cp fleet-reports/report-features/report-features.md .
          cp fleet-reports/report-quality/report-quality.md .

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install CTDF plugin
        run: |
          PLUGIN_DIR="$HOME/.claude/plugins"
          CACHE_DIR="$PLUGIN_DIR/cache/dnviti-plugins/ctdf/2.1.0"
          mkdir -p "$CACHE_DIR" "$PLUGIN_DIR/marketplaces"

          git clone --depth 1 https://github.com/dnviti/claude-task-development-framework.git \
            "$PLUGIN_DIR/marketplaces/dnviti-plugins"

          cp -r "$PLUGIN_DIR/marketplaces/dnviti-plugins/." "$CACHE_DIR/"

          cat > "$PLUGIN_DIR/installed_plugins.json" << 'PLUGINS_EOF'
          {
            "version": 2,
            "plugins": {
              "ctdf@dnviti-plugins": [
                {
                  "scope": "user",
                  "installPath": "$CACHE_DIR_PLACEHOLDER",
                  "version": "2.1.0"
                }
              ]
            }
          }
          PLUGINS_EOF

          sed -i "s|\$CACHE_DIR_PLACEHOLDER|$CACHE_DIR|g" "$PLUGIN_DIR/installed_plugins.json"

      - name: Run Opus idea scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude -p "/idea-scout \
            @project-memory.md \
            @report-infrastructure.md \
            @report-features.md \
            @report-quality.md" \
            --model claude-opus-4-6 \
            --max-turns 15 \
            --allowedTools "Bash,Read,Grep,Glob,WebSearch,WebFetch,Edit,Write"
