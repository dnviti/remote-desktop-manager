name: Gateways — Build & Scan

on:
  push:
    tags: ["v*"]
    branches: [staging, main]
    paths:
      - "gateways/**"
      - ".github/workflows/gateways-build.yml"
  pull_request:
    branches: [develop, staging, main]
    paths:
      - "gateways/**"
      - ".github/workflows/gateways-build.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io

jobs:
  go-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache-dependency-path: |
            gateways/**/go.mod
            gateways/**/go.sum

      - name: Run Go tests
        run: |
          set -euo pipefail
          while read -r module; do
            dir="$(dirname "$module")"
            echo "::group::$dir"
            (
              cd "$dir"
              GOWORK=off go vet ./...
              GOWORK=off go test -race -count=1 ./...
            )
            echo "::endgroup::"
          done < <(find gateways -name go.mod -print | sort)

  build-and-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        gateway:
          - name: guacd
            dockerfile: ./gateways/guacd/Dockerfile
            context: .
            trivy-category: trivy-guacd
          - name: guacenc
            dockerfile: ./gateways/guacenc/Dockerfile
            context: ./gateways/guacenc
            trivy-category: trivy-guacenc
          - name: ssh-gateway
            dockerfile: ./gateways/ssh-gateway/Dockerfile
            context: .
            trivy-category: trivy-ssh-gateway
          - name: tunnel-agent
            dockerfile: ./gateways/tunnel-agent/Dockerfile
            context: ./gateways/tunnel-agent
            trivy-category: trivy-tunnel-agent

    concurrency:
      group: gateway-${{ matrix.gateway.name }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main')
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.gateway.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.gateway.context }}
          file: ${{ matrix.gateway.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.gateway.name }}:scan
          cache-from: type=gha,scope=${{ matrix.gateway.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.gateway.name }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          cache: false
          image-ref: ${{ matrix.gateway.name }}:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: ${{ matrix.gateway.trivy-category }}

      - name: Push to registry
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main')
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.gateway.context }}
          file: ${{ matrix.gateway.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.gateway.name }}
