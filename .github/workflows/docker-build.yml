name: Docker Build

on:
  push:
    tags: ["v*"]
    branches: [main]
    paths:
      - "server/**"
      - "client/**"
      - "!server/**/*.md"
      - "!client/**/*.md"
      - "package.json"
      - "package-lock.json"
      - "eslint.config.js"
      - "eslint.config.mjs"
      - "tsconfig.json"
  pull_request:
    branches: [main, staging]
    paths:
      - "server/**"
      - "client/**"
      - "!server/**/*.md"
      - "!client/**/*.md"
      - "package.json"
      - "package-lock.json"
      - "eslint.config.js"
      - "eslint.config.mjs"
      - "tsconfig.json"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io

jobs:
  # ── Gate: Verify ──────────────────────────────────────────────
  verify-server:
    uses: ./.github/workflows/verify.yml
    with:
      workspace: server
    permissions:
      contents: read

  verify-client:
    uses: ./.github/workflows/verify.yml
    with:
      workspace: client
    permissions:
      contents: read

  # ── Gate: Security ────────────────────────────────────────────
  security-server:
    uses: ./.github/workflows/security.yml
    with:
      run-codeql: true
      trivy-category: trivy-filesystem-server
    permissions:
      contents: read
      security-events: write

  security-client:
    uses: ./.github/workflows/security.yml
    with:
      run-codeql: false
      trivy-category: trivy-filesystem-client
    permissions:
      contents: read
      security-events: write

  # ── Build, Scan & Push ───────────────────────────────────────
  build-and-scan:
    needs: [verify-server, verify-client, security-server, security-client]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: server
            dockerfile: ./server/Dockerfile
          - name: client
            dockerfile: ./client/Dockerfile

    concurrency:
      group: docker-${{ matrix.service.name }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/staging')
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: false
          load: true
          tags: arsenale-${{ matrix.service.name }}:scan
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: arsenale-${{ matrix.service.name }}:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.service.name }}

      - name: Push to registry
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/staging')
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
