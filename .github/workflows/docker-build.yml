name: Docker Build

on:
  push:
    tags: ["v*"]
    branches: [staging, main]
    paths:
      - "backend/**"
      - "client/**"
      - "gateways/tunnel-agent/**"
      - "extra-clients/browser-extensions/**"
      - ".github/workflows/docker-build.yml"
      - ".github/workflows/verify.yml"
      - ".github/workflows/security.yml"
      - ".github/codeql/**"
      - "backend/Dockerfile"
      - "backend/go.mod"
      - "backend/go.sum"
      - "go.work"
      - "go.work.sum"
      - "!client/**/*.md"
      - "package.json"
      - "package-lock.json"
      - "eslint.config.js"
      - "eslint.config.mjs"
      - "tsconfig.json"
  pull_request:
    branches: [develop, staging, main]
    paths:
      - "backend/**"
      - "client/**"
      - "gateways/tunnel-agent/**"
      - "extra-clients/browser-extensions/**"
      - ".github/workflows/docker-build.yml"
      - ".github/workflows/verify.yml"
      - ".github/workflows/security.yml"
      - ".github/codeql/**"
      - "backend/Dockerfile"
      - "backend/go.mod"
      - "backend/go.sum"
      - "go.work"
      - "go.work.sum"
      - "!client/**/*.md"
      - "package.json"
      - "package-lock.json"
      - "eslint.config.js"
      - "eslint.config.mjs"
      - "tsconfig.json"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io

jobs:
  # ── Gate: Verify ──────────────────────────────────────────────
  verify-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: |
            go.work.sum
            backend/go.mod
            backend/go.sum

      - name: Verify sqlc generation
        working-directory: backend
        run: |
          go run github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0 generate -f sqlc.yaml
          git diff --exit-code

      - name: Run backend tests
        working-directory: backend
        run: |
          go vet ./...
          go test -race -count=1 ./...

  verify-client:
    uses: ./.github/workflows/verify.yml
    with:
      workspace: client
    permissions:
      contents: read

  # ── Gate: Security ────────────────────────────────────────────
  security-js:
    uses: ./.github/workflows/security.yml
    with:
      run-codeql: true
      trivy-category: trivy-filesystem-javascript
    permissions:
      contents: read
      security-events: write

  security-client:
    uses: ./.github/workflows/security.yml
    with:
      run-codeql: false
      trivy-category: trivy-filesystem-client
    permissions:
      contents: read
      security-events: write

  # ── Build, Scan & Push ───────────────────────────────────────
  build-and-scan:
    needs: [verify-backend, verify-client, security-js, security-client]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: control-plane-api
            dockerfile: ./backend/Dockerfile
            context: .
            build_args: |
              SERVICE=control-plane-api
          - name: control-plane-controller
            dockerfile: ./backend/Dockerfile
            context: .
            build_args: |
              SERVICE=control-plane-controller
          - name: authz-pdp
            dockerfile: ./backend/Dockerfile
            context: .
            build_args: |
              SERVICE=authz-pdp
          - name: model-gateway
            dockerfile: ./backend/Dockerfile
            context: .
            build_args: |
              SERVICE=model-gateway
          - name: tool-gateway
            dockerfile: ./backend/Dockerfile
            context: .
            build_args: |
              SERVICE=tool-gateway
          - name: agent-orchestrator
            dockerfile: ./backend/Dockerfile
            context: .
            build_args: |
              SERVICE=agent-orchestrator
          - name: memory-service
            dockerfile: ./backend/Dockerfile
            context: .
            build_args: |
              SERVICE=memory-service
          - name: terminal-broker
            dockerfile: ./backend/Dockerfile
            context: .
            build_args: |
              SERVICE=terminal-broker
          - name: desktop-broker
            dockerfile: ./backend/Dockerfile
            context: .
            build_args: |
              SERVICE=desktop-broker
          - name: tunnel-broker-go
            dockerfile: ./backend/Dockerfile
            context: .
            build_args: |
              SERVICE=tunnel-broker
          - name: query-runner
            dockerfile: ./backend/Dockerfile
            context: .
            build_args: |
              SERVICE=query-runner
          - name: runtime-agent
            dockerfile: ./backend/Dockerfile
            context: .
            build_args: |
              SERVICE=runtime-agent
          - name: client
            dockerfile: ./client/Dockerfile
            context: .
            build_args: ""

    concurrency:
      group: docker-${{ matrix.service.name }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main')
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          build-args: ${{ matrix.service.build_args }}
          push: false
          load: true
          tags: arsenale-${{ matrix.service.name }}:scan
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          cache: false
          image-ref: arsenale-${{ matrix.service.name }}:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.service.name }}

      - name: Push to registry
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main')
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          build-args: ${{ matrix.service.build_args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
