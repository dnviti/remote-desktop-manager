---
# Development environment: postgres + gocache only, with localhost port forwarding

- name: Template dev compose file
  template:
    src: "{{ role_path }}/../deploy/templates/compose.dev.yml.j2"
    dest: "{{ arsenale_home }}/docker-compose.dev.yml"
    mode: "0640"

- name: Template development .env
  template:
    src: env.dev.j2
    dest: "{{ arsenale_home }}/.env"
    mode: "0640"

- name: Start dev infrastructure
  command: >
    {{ container_runtime }} compose -f {{ arsenale_home }}/docker-compose.dev.yml
    up -d
  when: arsenale_dev_state == 'present'
  changed_when: true

- name: Stop dev infrastructure
  command: >
    {{ container_runtime }} compose -f {{ arsenale_home }}/docker-compose.dev.yml
    down
  when: arsenale_dev_state == 'absent'
  changed_when: true

- name: Wait for postgres to be healthy
  command: >
    {{ container_runtime }} exec postgres
    pg_isready -U {{ arsenale_db_user }} -d {{ arsenale_db_name }}
  register: pg_ready
  retries: 30
  delay: 2
  until: pg_ready.rc == 0
  when: arsenale_dev_state == 'present'
  changed_when: false

- name: Wait for gocache to be healthy
  uri:
    url: "http://localhost:6381/health"
    status_code: 200
  register: cache_ready
  retries: 15
  delay: 2
  until: cache_ready.status == 200
  when: arsenale_dev_state == 'present'
  failed_when: false

- name: Generate Prisma client
  command: npm run db:generate
  args:
    chdir: "{{ arsenale_home }}"
  when: arsenale_dev_state == 'present'
  changed_when: true

- name: Development environment ready
  debug:
    msg: |
      Development infrastructure is running:
        PostgreSQL: localhost:5432 (user: {{ arsenale_db_user }})
        GoCache:    localhost:6380 (gRPC) / localhost:6381 (health)

      Start the application:
        npm run dev

      Stop infrastructure:
        make dev-down
  when: arsenale_dev_state == 'present'
