---
- name: Rotate Arsenale secrets
  hosts: arsenale-control-plane
  become: true
  become_user: "{{ arsenale_user }}"

  vars_prompt:
    - name: confirm_rotation
      prompt: "This will rotate ALL secrets and restart services. Type 'yes' to confirm"
      private: false

  tasks:
    - name: Abort if not confirmed
      fail:
        msg: "Secret rotation aborted"
      when: confirm_rotation != 'yes'

    - name: Generate new secrets
      set_fact:
        new_jwt_secret: "{{ lookup('community.general.random_string', length=128, override_special='', override_all='0123456789abcdef') }}"
        new_guacamole_secret: "{{ lookup('community.general.random_string', length=64, override_special='', override_all='0123456789abcdef') }}"
        new_encryption_key: "{{ lookup('community.general.random_string', length=64, override_special='', override_all='0123456789abcdef') }}"
        new_guacenc_token: "{{ lookup('community.general.random_string', length=64, override_special='', override_all='0123456789abcdef') }}"
        new_runtime_egress_principal_signing_key: "{{ lookup('community.general.random_string', length=64, override_special='', override_all='0123456789abcdef') }}"
      no_log: true

    - name: Backup database before rotation
      command: >
        podman exec arsenale-postgres pg_dump
        -U {{ arsenale_db_user }}
        -d {{ arsenale_db_name }}
      register: db_backup
      changed_when: false

    - name: Save database backup
      copy:
        content: "{{ db_backup.stdout }}"
        dest: "{{ arsenale_backup_dir }}/pre-rotation-{{ ansible_date_time.iso8601_basic_short }}.sql"
        mode: "0600"

    - name: Update Podman secrets
      containers.podman.podman_secret:
        name: "{{ item.name }}"
        data: "{{ item.value }}"
        state: present
        force: true
      loop:
        - { name: jwt_secret, value: "{{ new_jwt_secret }}" }
        - { name: guacamole_secret, value: "{{ new_guacamole_secret }}" }
        - { name: server_encryption_key, value: "{{ new_encryption_key }}" }
        - { name: guacenc_auth_token, value: "{{ new_guacenc_token }}" }
        - { name: runtime_egress_principal_signing_key, value: "{{ new_runtime_egress_principal_signing_key }}" }
      no_log: true

    - name: Restart services to pick up new secrets
      command: >
        podman-compose -f {{ arsenale_home }}/docker-compose.yml
        restart server guacenc
      changed_when: true
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ arsenale_uid }}"

    - name: Wait for services to be healthy
      command: >
        podman-compose -f {{ arsenale_home }}/docker-compose.yml
        ps --format json
      register: compose_status
      retries: 24
      delay: 5
      until: >
        (compose_status.stdout | from_json | selectattr('Health', 'equalto', 'healthy') | list | length) >= 5
      changed_when: false

    - name: Rotation complete
      debug:
        msg: |
          Secrets rotated successfully.
          All active sessions have been invalidated (new JWT secret).
          Database backup saved at: {{ arsenale_backup_dir }}/pre-rotation-{{ ansible_date_time.iso8601_basic_short }}.sql
          IMPORTANT: Update vault.yml with the new secrets for future deployments.
