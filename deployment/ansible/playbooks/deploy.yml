    - name: Verify Go terminal-broker SSH grant path in development
      shell: |
        set -euo pipefail
        terminal_grant_json="$(curl --silent --show-error --fail \
          -H "content-type: application/json" \
          -d '{"capability":"connection.connect.ssh","authz":{"subject":{"type":"agent_run","id":"ansible-bootstrap"},"resource":{"type":"connection","id":"terminal-target"},"context":{"approved":"true"}},"input":{"sessionId":"ansible-terminal","connectionId":"terminal-target","userId":"ansible","expiresAt":"2030-01-01T00:00:00Z","target":{"host":"terminal-target","port":2224,"username":"acceptance","password":"acceptance"},"terminal":{"term":"xterm-256color","cols":80,"rows":24}}}' \
          http://127.0.0.1:18084/v1/tool-calls:execute)"
        printf '%s' "${terminal_grant_json}" | jq -e '.decision.effect == "allow" and (.output.webSocketUrl | startswith("ws://"))' >/dev/null
        terminal_ws_url="$(printf '%s' "${terminal_grant_json}" | jq -r '.output.webSocketUrl')"
        TERMINAL_WS_URL="${terminal_ws_url}" node <<'NODE'
        const WebSocket = require('ws');

        const ws = new WebSocket(process.env.TERMINAL_WS_URL);
        let ready = false;
        let sawOutput = false;
        let buffer = '';
        const timeout = setTimeout(() => {
          console.error('terminal broker websocket timed out');
          process.exit(1);
        }, 15000);

        ws.on('message', (raw) => {
          const message = JSON.parse(raw.toString());
          if (message.type === 'ready' && !ready) {
            ready = true;
            ws.send(JSON.stringify({ type: 'input', data: 'echo ansible-terminal && exit\n' }));
            return;
          }

          if (message.type === 'data') {
            buffer += message.data || '';
            if (buffer.includes('ansible-terminal')) {
              sawOutput = true;
            }
            return;
          }

          if (message.type === 'error') {
            clearTimeout(timeout);
            console.error(message.message || message.code || 'terminal broker error');
            process.exit(1);
          }

          if (message.type === 'closed') {
            clearTimeout(timeout);
            process.exit(sawOutput ? 0 : 1);
          }
        });

        ws.on('error', (err) => {
          clearTimeout(timeout);
          console.error(err.message);
          process.exit(1);
        });

        ws.on('close', () => {
          clearTimeout(timeout);
          process.exit(sawOutput ? 0 : 1);
        });
        NODE
      args:
        executable: /bin/bash
      retries: 24
      delay: 5
      register: terminal_broker_check
      until: terminal_broker_check.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

