---
# =============================================================================
# Arsenale Deployment — unified playbook for production AND development
# =============================================================================
# Usage:
#   Production:   ansible-playbook playbooks/deploy.yml --ask-vault-pass
#   Development:  ansible-playbook playbooks/deploy.yml -e arsenale_env=development
#   Dev teardown: ansible-playbook playbooks/deploy.yml -e arsenale_env=development -e arsenale_state=absent
#
# The arsenale_env variable controls the environment. All roles are shared;
# templates use conditionals for environment-specific behavior.
# =============================================================================

- name: "Deploy Arsenale ({{ arsenale_env | default('production') }})"
  hosts: "{{ 'localhost' if (arsenale_env | default('production')) == 'development' else 'arsenale-server' }}"
  connection: "{{ 'local' if (arsenale_env | default('production')) == 'development' else 'ssh' }}"
  become: "{{ (arsenale_env | default('production')) != 'development' }}"
  become_user: "{{ arsenale_user | default('arsenale') }}"
  gather_facts: true

  vars:
    _is_dev: "{{ (arsenale_env | default('production')) == 'development' }}"
    _state: "{{ arsenale_state | default('present') }}"
    _home: "{{ (playbook_dir + '/../../..') if _is_dev | bool else (arsenale_home | default('/opt/arsenale')) }}"
    # Environment-specific overrides
    arsenale_node_env: "{{ 'development' if _is_dev | bool else 'production' }}"
    arsenale_log_level: "{{ 'debug' if _is_dev | bool else 'info' }}"
    arsenale_log_http_requests: "{{ 'true' if _is_dev | bool else 'false' }}"
    arsenale_log_guacamole: "{{ 'true' if _is_dev | bool else 'false' }}"
    arsenale_log_timestamps: "true"
    arsenale_firewall_enabled: "{{ false if _is_dev | bool else true }}"
    _build: "{{ true if _is_dev | bool else (arsenale_build_images | default(true)) }}"
    arsenale_cert_dir: "{{ (_home + '/dev-certs') if _is_dev | bool else (_home + '/certs') }}"

  pre_tasks:
    - name: Validate required vault secrets
      assert:
        that:
          - vault_jwt_secret != 'CHANGE_ME'
          - vault_guacamole_secret != 'CHANGE_ME'
          - vault_server_encryption_key != 'CHANGE_ME'
          - vault_postgres_password != 'CHANGE_ME'
          - vault_guacenc_auth_token != 'CHANGE_ME'
        fail_msg: "Run 'make setup' or './scripts/generate-vault.sh' first to generate secrets"
      when: _state == 'present'

    - name: Detect container runtime (dev)
      command: podman --version
      register: podman_check
      changed_when: false
      failed_when: false
      when: _is_dev | bool

    - name: Set container runtime
      set_fact:
        container_runtime: "{{ 'podman' if (podman_check.rc | default(1)) == 0 else 'docker' }}"
      when: _is_dev | bool

    - name: "Environment: {{ arsenale_env | default('production') }}"
      debug:
        msg: |
          Mode:       {{ arsenale_env | default('production') }}
          Node env:   {{ arsenale_node_env }}
          Log level:  {{ arsenale_log_level }}
          Build:      {{ _build }}
          Firewall:   {{ arsenale_firewall_enabled }}
          Certs:      {{ arsenale_cert_dir }}
          State:      {{ _state }}

  roles:
    - role: prerequisites
      when: not (_is_dev | bool)
    - role: certificates
      when: _state == 'present'
    - role: podman_secrets
      when: _state == 'present'
    - deploy
    - role: firewall
      when: arsenale_firewall_enabled | bool
    - role: healthcheck
      when: _state == 'present'

  post_tasks:
    - name: Generate Prisma client (dev)
      command: npm run db:generate
      args:
        chdir: "{{ _home }}"
      environment:
        DATABASE_URL: "{{ vault_database_url }}"
      when: _is_dev | bool and _state == 'present'
      changed_when: true

    - name: Development ready
      debug:
        msg: |
          Arsenale dev stack running (all services, verbose logging).
          Run on host for hot-reload: npm run dev
          Stop: ansible-playbook playbooks/deploy.yml -e arsenale_env=development -e arsenale_state=absent
      when: _is_dev | bool and _state == 'present'
