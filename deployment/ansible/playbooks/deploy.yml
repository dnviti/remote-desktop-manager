---
# =============================================================================
# Arsenale Deployment — unified playbook for production AND development
# =============================================================================
# Usage:
#   Production:   ansible-playbook playbooks/deploy.yml --ask-vault-pass
#   Development:  ansible-playbook playbooks/deploy.yml -e arsenale_env=development
#   Dev teardown: ansible-playbook playbooks/deploy.yml -e arsenale_env=development -e arsenale_state=absent
#
# The arsenale_env variable controls the environment. All roles are shared;
# templates use conditionals for environment-specific behavior.
# =============================================================================

- name: "Deploy Arsenale ({{ arsenale_env | default('production') }})"
  hosts: "{{ 'localhost' if (arsenale_env | default('production')) == 'development' else 'arsenale-control-plane' }}"
  connection: "{{ 'local' if (arsenale_env | default('production')) == 'development' else 'ssh' }}"
  become: "{{ (arsenale_env | default('production')) != 'development' }}"
  become_user: "{{ arsenale_user | default('arsenale') }}"
  gather_facts: true

  vars:
    _is_dev: "{{ (arsenale_env | default('production')) == 'development' }}"
    _state: "{{ arsenale_state | default('present') }}"
    _home: "{{ (playbook_dir + '/../../..') if _is_dev | bool else (arsenale_home | default('/opt/arsenale')) }}"
    # Environment-specific overrides
    arsenale_node_env: "{{ 'development' if _is_dev | bool else 'production' }}"
    arsenale_log_level: "info"
    arsenale_log_http_requests: "false"
    arsenale_log_guacamole: "false"
    arsenale_log_timestamps: "true"
    arsenale_firewall_enabled: "{{ false if _is_dev | bool else true }}"
    arsenale_trust_proxy_effective: "{{ 1 if _is_dev | bool else (arsenale_trust_proxy | default(false)) }}"
    _cookie_secure: "{{ true if _is_dev | bool else (arsenale_cookie_secure | default(true)) }}"
    _client_bind_host: "{{ arsenale_client_bind_host | default('0.0.0.0') }}"
    _public_url: "{{ arsenale_public_url | default('https://' ~ arsenale_domain ~ ('' if (arsenale_client_port | int) == 443 else ':' ~ (arsenale_client_port | string))) }}"
    _dev_client_url: "{{ 'https://localhost:' ~ (arsenale_client_port | string) }}"
    _build: "{{ true if _is_dev | bool else (arsenale_build_images | default(true)) }}"
    arsenale_cert_dir: "{{ (_home + '/dev-certs') if _is_dev | bool else (_home + '/certs') }}"
    dev_sample_postgres_host: "dev-demo-postgres"
    dev_sample_postgres_port: 5432
    dev_sample_postgres_database: "arsenale_demo"
    dev_sample_postgres_user: "demo_pg_user"
    dev_sample_postgres_password: "DemoPgPass123!"
    dev_sample_postgres_ssl_mode: "disable"
    dev_sample_mysql_host: "dev-demo-mysql"
    dev_sample_mysql_port: 3306
    dev_sample_mysql_database: "arsenale_demo"
    dev_sample_mysql_user: "demo_mysql_user"
    dev_sample_mysql_password: "DemoMySqlPass123!"
    dev_sample_mysql_root_password: "DemoMySqlRoot123!"
    dev_sample_mongodb_host: "dev-demo-mongodb"
    dev_sample_mongodb_port: 27017
    dev_sample_mongodb_database: "arsenale_demo"
    dev_sample_mongodb_root_user: "demo_mongo_root"
    dev_sample_mongodb_root_password: "DemoMongoRoot123!"
    dev_sample_mongodb_user: "demo_mongo_user"
    dev_sample_mongodb_password: "DemoMongoPass123!"
    dev_sample_oracle_host: "dev-demo-oracle"
    dev_sample_oracle_port: 1521
    dev_sample_oracle_service_name: "FREEPDB1"
    dev_sample_oracle_user: "demo_oracle_user"
    dev_sample_oracle_password: "DemoOraclePass123!"
    dev_sample_oracle_system_password: "DemoOracleSys123!"
    dev_sample_mssql_host: "dev-demo-mssql"
    dev_sample_mssql_port: 1433
    dev_sample_mssql_database: "ArsenaleDemo"
    dev_sample_mssql_user: "demo_mssql_user"
    dev_sample_mssql_password: "DemoMssqlPass123!"
    dev_sample_mssql_sa_password: "DemoMssqlSa123!"

  pre_tasks:
    - name: Validate required vault secrets
      assert:
        that:
          - vault_jwt_secret != 'CHANGE_ME'
          - vault_guacamole_secret != 'CHANGE_ME'
          - vault_server_encryption_key != 'CHANGE_ME'
          - vault_postgres_password != 'CHANGE_ME'
          - vault_guacenc_auth_token != 'CHANGE_ME'
        fail_msg: "Run 'make setup' or './scripts/generate-vault.sh' first to generate secrets"
      when: _state == 'present'

    - name: Detect container runtime (dev)
      command: podman --version
      register: podman_check
      changed_when: false
      failed_when: false
      when: _is_dev | bool

    - name: Set container runtime
      set_fact:
        container_runtime: "{{ 'podman' if (podman_check.rc | default(1)) == 0 else 'docker' }}"
      when: _is_dev | bool

    - name: Detect upstream DNS servers for containers
      shell: |
        set -euo pipefail
        source_file=/etc/resolv.conf
        if [ -f /run/systemd/resolve/resolv.conf ]; then
          source_file=/run/systemd/resolve/resolv.conf
        fi
        awk '/^nameserver / {print $2}' "$source_file" \
          | grep -vE '^(127\\.|::1$|0\\.0\\.0\\.0$)' \
          | awk '!seen[$0]++'
      args:
        executable: /bin/bash
      changed_when: false
      register: container_dns_servers_raw
      when: _state == 'present'

    - name: Set upstream DNS servers for managed containers
      set_fact:
        arsenale_container_dns_servers: "{{ container_dns_servers_raw.stdout_lines | default([]) }}"
      when: _state == 'present'

    - name: Ensure managed container resolver directory exists
      file:
        path: "{{ arsenale_cert_dir }}/orchestrator"
        state: directory
        mode: "0755"
      when: _state == 'present'

    - name: Write managed container resolv.conf
      copy:
        dest: "{{ arsenale_cert_dir }}/orchestrator/resolv.conf"
        mode: "0644"
        content: |
          {% for dns_server in (arsenale_container_dns_servers | default([])) %}
          nameserver {{ dns_server }}
          {% endfor %}
      when: _state == 'present'

    - name: "Environment: {{ arsenale_env | default('production') }}"
      debug:
        msg: |
          Mode:       {{ arsenale_env | default('production') }}
          Node env:   {{ arsenale_node_env }}
          Log level:  {{ arsenale_log_level }}
          Build:      {{ _build }}
          Firewall:   {{ arsenale_firewall_enabled }}
          Certs:      {{ arsenale_cert_dir }}
          ResolvConf: {{ arsenale_cert_dir }}/orchestrator/resolv.conf
          DNS:        {{ (arsenale_container_dns_servers | default([])) | join(', ') }}
          State:      {{ _state }}

  roles:
    - role: prerequisites
      when: not (_is_dev | bool)
    - role: certificates
      when: _state == 'present'
    - role: podman_secrets
      when: _state == 'present'
    - deploy
    - role: firewall
      when: arsenale_firewall_enabled | bool
    - role: healthcheck
      when: _state == 'present' and not (_is_dev | bool)

  post_tasks:
    - name: Bootstrap development gateways and tunnel fixtures
      command: >
        {{ container_runtime | default('podman') }} exec
        --user 0
        arsenale-control-plane-api
        /usr/local/bin/service dev-bootstrap
      when: _is_dev | bool and _state == 'present'
      changed_when: true
      register: dev_bootstrap
      retries: 12
      delay: 5
      until: dev_bootstrap.rc == 0

    - name: Run development container health checks after bootstrap
      include_role:
        name: healthcheck
      when: _is_dev | bool and _state == 'present'

    - name: Seed development demo PostgreSQL dataset
      shell: |
        set -euo pipefail
        {{ container_runtime | default('podman') }} exec \
          -e PGPASSWORD='{{ dev_sample_postgres_password }}' \
          arsenale-dev-demo-postgres \
          psql -h 127.0.0.1 -U '{{ dev_sample_postgres_user }}' -d '{{ dev_sample_postgres_database }}' -v ON_ERROR_STOP=1 -f /seed/seed.sql
      args:
        executable: /bin/bash
      retries: 24
      delay: 5
      register: demo_postgres_seed
      until: demo_postgres_seed.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

    - name: Seed development demo MySQL dataset
      shell: |
        set -euo pipefail
        {{ container_runtime | default('podman') }} exec arsenale-dev-demo-mysql sh -lc \
          'mysql -h 127.0.0.1 -u"${MYSQL_USER}" -p"${MYSQL_PASSWORD}" "${MYSQL_DATABASE}" < /seed/seed.sql'
      args:
        executable: /bin/bash
      retries: 24
      delay: 5
      register: demo_mysql_seed
      until: demo_mysql_seed.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

    - name: Seed development demo MongoDB dataset
      shell: |
        set -euo pipefail
        {{ container_runtime | default('podman') }} exec arsenale-dev-demo-mongodb \
          mongosh --quiet --host 127.0.0.1 --port {{ dev_sample_mongodb_port }} \
          -u '{{ dev_sample_mongodb_root_user }}' \
          -p '{{ dev_sample_mongodb_root_password }}' \
          --authenticationDatabase admin \
          /seed/seed.js
      args:
        executable: /bin/bash
      retries: 24
      delay: 5
      register: demo_mongodb_seed
      until: demo_mongodb_seed.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

    - name: Seed development demo Oracle dataset
      shell: |
        set -euo pipefail
        {{ container_runtime | default('podman') }} exec arsenale-dev-demo-oracle bash -lc \
          "sqlplus -L -s '{{ dev_sample_oracle_user }}/{{ dev_sample_oracle_password }}@//127.0.0.1:{{ dev_sample_oracle_port }}/{{ dev_sample_oracle_service_name }}' @/seed/seed.sql"
      args:
        executable: /bin/bash
      retries: 48
      delay: 10
      register: demo_oracle_seed
      until: demo_oracle_seed.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

    - name: Seed development demo MSSQL dataset
      shell: |
        set -euo pipefail
        {{ container_runtime | default('podman') }} exec arsenale-dev-demo-mssql bash -lc '
          sqlcmd_path="/opt/mssql-tools18/bin/sqlcmd"
          if [ ! -x "${sqlcmd_path}" ]; then
            sqlcmd_path="/opt/mssql-tools/bin/sqlcmd"
          fi
          "${sqlcmd_path}" -S 127.0.0.1,{{ dev_sample_mssql_port }} -U sa -P "{{ dev_sample_mssql_sa_password }}" -C -i /seed/seed.sql
        '
      args:
        executable: /bin/bash
      retries: 48
      delay: 10
      register: demo_mssql_seed
      until: demo_mssql_seed.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

    - name: Verify seeded development demo PostgreSQL dataset
      shell: |
        set -euo pipefail
        count="$(
          {{ container_runtime | default('podman') }} exec \
            -e PGPASSWORD='{{ dev_sample_postgres_password }}' \
            arsenale-dev-demo-postgres \
            psql -h 127.0.0.1 -U '{{ dev_sample_postgres_user }}' -d '{{ dev_sample_postgres_database }}' -Atqc 'SELECT COUNT(*) FROM public.demo_customers'
        )"
        [[ "${count}" == "2" ]]
      args:
        executable: /bin/bash
      retries: 12
      delay: 5
      register: demo_postgres_smoke
      until: demo_postgres_smoke.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

    - name: Verify seeded development demo MySQL dataset
      shell: |
        set -euo pipefail
        count="$(
          {{ container_runtime | default('podman') }} exec arsenale-dev-demo-mysql sh -lc \
            'mysql -N -B -h 127.0.0.1 -u"${MYSQL_USER}" -p"${MYSQL_PASSWORD}" "${MYSQL_DATABASE}" -e "SELECT COUNT(*) FROM demo_customers"'
        )"
        [[ "${count}" == "2" ]]
      args:
        executable: /bin/bash
      retries: 12
      delay: 5
      register: demo_mysql_smoke
      until: demo_mysql_smoke.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

    - name: Verify seeded development demo MongoDB dataset
      shell: |
        set -euo pipefail
        count="$(
          {{ container_runtime | default('podman') }} exec arsenale-dev-demo-mongodb \
            mongosh --quiet --host 127.0.0.1 --port {{ dev_sample_mongodb_port }} \
            -u '{{ dev_sample_mongodb_user }}' \
            -p '{{ dev_sample_mongodb_password }}' \
            --authenticationDatabase '{{ dev_sample_mongodb_database }}' \
            --eval 'db = db.getSiblingDB("{{ dev_sample_mongodb_database }}"); print(db.demo_customers.countDocuments())'
        )"
        [[ "${count}" == "2" ]]
      args:
        executable: /bin/bash
      retries: 12
      delay: 5
      register: demo_mongodb_smoke
      until: demo_mongodb_smoke.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

    - name: Verify seeded development demo Oracle dataset
      shell: |
        set -euo pipefail
        count="$(
          {{ container_runtime | default('podman') }} exec arsenale-dev-demo-oracle bash -lc \
            "printf 'SET HEADING OFF FEEDBACK OFF PAGESIZE 0 VERIFY OFF TERMOUT OFF\nSELECT COUNT(*) FROM demo_customers;\nEXIT;\n' | sqlplus -L -s '{{ dev_sample_oracle_user }}/{{ dev_sample_oracle_password }}@//127.0.0.1:{{ dev_sample_oracle_port }}/{{ dev_sample_oracle_service_name }}'"
        )"
        count="$(printf '%s' "${count}" | tr -d '\r[:space:]')"
        [[ "${count}" == "2" ]]
      args:
        executable: /bin/bash
      retries: 12
      delay: 10
      register: demo_oracle_smoke
      until: demo_oracle_smoke.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

    - name: Verify seeded development demo MSSQL dataset
      shell: |
        set -euo pipefail
        count="$(
          {{ container_runtime | default('podman') }} exec arsenale-dev-demo-mssql bash -lc '
            sqlcmd_path="/opt/mssql-tools18/bin/sqlcmd"
            if [ ! -x "${sqlcmd_path}" ]; then
              sqlcmd_path="/opt/mssql-tools/bin/sqlcmd"
            fi
            "${sqlcmd_path}" -S 127.0.0.1,{{ dev_sample_mssql_port }} -U {{ dev_sample_mssql_user }} -P "{{ dev_sample_mssql_password }}" -C -d {{ dev_sample_mssql_database }} -h -1 -W -Q "SET NOCOUNT ON; SELECT COUNT(*) FROM dbo.demo_customers;"
          '
        )"
        count="$(printf '%s' "${count}" | tr -d '\r[:space:]')"
        [[ "${count}" == "2" ]]
      args:
        executable: /bin/bash
      retries: 12
      delay: 10
      register: demo_mssql_smoke
      until: demo_mssql_smoke.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

    - name: Verify Go foundation services in development
      uri:
        url: "http://127.0.0.1:{{ item.port }}{{ item.path }}"
        status_code: 200
      loop:
        - { port: 18080, path: "/v1/meta/service" }
        - { port: 18080, path: "/v1/orchestrators" }
        - { port: 18081, path: "/v1/meta/service" }
        - { port: 18081, path: "/v1/reconcile/schema" }
        - { port: 18082, path: "/v1/meta/service" }
        - { port: 18083, path: "/v1/providers" }
        - { port: 18084, path: "/v1/capabilities" }
        - { port: 18090, path: "/v1/session-protocol" }
        - { port: 18091, path: "/v1/meta/service" }
        - { port: 18093, path: "/v1/meta/service" }
        - { port: 18085, path: "/v1/meta/service" }
        - { port: 18086, path: "/v1/memory/schema" }
        - { port: 18095, path: "/v1/meta/service" }
      retries: 24
      delay: 5
      register: go_service_checks
      until: go_service_checks.status == 200
      when: _is_dev | bool and _state == 'present'

    - name: Verify Go setup status endpoints in development
      shell: |
        set -euo pipefail
        curl --silent --show-error --fail {{ _dev_client_url }}/api/setup/status \
          --cacert {{ arsenale_cert_dir }}/client/ca.pem \
          | jq -e '.required == false' >/dev/null
        curl --silent --show-error {{ _dev_client_url }}/api/setup/db-status \
          --cacert {{ arsenale_cert_dir }}/client/ca.pem \
          | tee /tmp/arsenale-setup-db-status.json \
          | jq -e '.error == "Setup has already been completed"' >/dev/null
      args:
        executable: /bin/bash
      retries: 24
      delay: 5
      register: setup_status_check
      until: setup_status_check.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

    - name: Verify Go auth public config endpoint in development
      shell: |
        set -euo pipefail
        curl --silent --show-error --fail {{ _dev_client_url }}/api/auth/config \
          --cacert {{ arsenale_cert_dir }}/client/ca.pem \
          | jq -e '.selfSignupEnabled == false and .features.databaseProxyEnabled == true and .features.connectionsEnabled == true and .features.keychainEnabled == true' >/dev/null
      args:
        executable: /bin/bash
      retries: 24
      delay: 5
      register: auth_config_check
      until: auth_config_check.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

    - name: Verify Go authenticated user profile endpoint in development
      shell: |
        set -euo pipefail
        {{ container_runtime | default('podman') }} exec arsenale-redis sh -lc 'keys=$(redis-cli --scan --pattern "rl:*"); if [ -n "$keys" ]; then redis-cli DEL $keys >/dev/null; fi'
        {{ container_runtime | default('podman') }} exec arsenale-postgres sh -lc "printf '%s\n' \"UPDATE \\\"User\\\" SET \\\"failedLoginAttempts\\\" = 0, \\\"lockedUntil\\\" = NULL WHERE email = '{{ arsenale_dev_bootstrap_admin_email }}';\" | PGPASSWORD='{{ vault_postgres_password }}' psql -U '{{ arsenale_db_user }}' -d '{{ arsenale_db_name }}' >/dev/null"
        rm -f /tmp/arsenale-dev-access-token /tmp/arsenale-dev-tenant-id
        ARSENALE_SAMPLE_POSTGRES_HOST='{{ dev_sample_postgres_host }}' \
        ARSENALE_SAMPLE_POSTGRES_PORT='{{ dev_sample_postgres_port }}' \
        ARSENALE_SAMPLE_POSTGRES_DB_NAME='{{ dev_sample_postgres_database }}' \
        ARSENALE_SAMPLE_POSTGRES_USER='{{ dev_sample_postgres_user }}' \
        ARSENALE_SAMPLE_POSTGRES_PASSWORD='{{ dev_sample_postgres_password }}' \
        ARSENALE_SAMPLE_POSTGRES_SSL_MODE='{{ dev_sample_postgres_ssl_mode }}' \
        {{ playbook_dir }}/../../../scripts/dev-api-acceptance.sh >/tmp/arsenale-ansible-acceptance.log
      args:
        executable: /bin/bash
      retries: 24
      delay: 5
      register: user_profile_check
      until: user_profile_check.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

    - name: Verify Go read-only query execution in development
      command: >
        curl --silent --show-error --fail
        -H "content-type: application/json"
        -d '{"sql":"select current_database() as database_name","maxRows":1,"target":{"protocol":"postgresql","host":"{{ dev_sample_postgres_host }}","port":{{ dev_sample_postgres_port }},"database":"{{ dev_sample_postgres_database }}","sslMode":"{{ dev_sample_postgres_ssl_mode }}","username":"{{ dev_sample_postgres_user }}","password":"{{ dev_sample_postgres_password }}"}}'
        http://127.0.0.1:18093/v1/query-runs:execute
      retries: 24
      delay: 5
      register: query_runner_check
      until: query_runner_check.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

    - name: Verify Go explain execution in development
      shell: |
        set -euo pipefail
        curl --silent --show-error --fail \
          -H "content-type: application/json" \
          -d '{"sql":"select current_database() as database_name","target":{"protocol":"postgresql","host":"{{ dev_sample_postgres_host }}","port":{{ dev_sample_postgres_port }},"database":"{{ dev_sample_postgres_database }}","sslMode":"{{ dev_sample_postgres_ssl_mode }}","username":"{{ dev_sample_postgres_user }}","password":"{{ dev_sample_postgres_password }}"}}' \
          http://127.0.0.1:18093/v1/query-plans:explain \
          | jq -e '.supported == true and .format == "json"' >/dev/null
      args:
        executable: /bin/bash
      retries: 24
      delay: 5
      register: query_runner_explain_check
      until: query_runner_explain_check.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

    - name: Verify Go introspection execution in development
      shell: |
        set -euo pipefail
        curl --silent --show-error --fail \
          -H "content-type: application/json" \
          -d '{"type":"database_version","db":{"protocol":"postgresql","host":"{{ dev_sample_postgres_host }}","port":{{ dev_sample_postgres_port }},"database":"{{ dev_sample_postgres_database }}","sslMode":"{{ dev_sample_postgres_ssl_mode }}","username":"{{ dev_sample_postgres_user }}","password":"{{ dev_sample_postgres_password }}"}}' \
          http://127.0.0.1:18093/v1/introspection:run \
          | jq -e '.supported == true and (.data.version | type == "string")' >/dev/null
      args:
        executable: /bin/bash
      retries: 24
      delay: 5
      register: query_runner_introspection_check
      until: query_runner_introspection_check.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

    - name: Verify Go schema fetch execution in development
      shell: |
        set -euo pipefail
        curl --silent --show-error --fail \
          -H "content-type: application/json" \
          -d '{"target":{"protocol":"postgresql","host":"{{ dev_sample_postgres_host }}","port":{{ dev_sample_postgres_port }},"database":"{{ dev_sample_postgres_database }}","sslMode":"{{ dev_sample_postgres_ssl_mode }}","username":"{{ dev_sample_postgres_user }}","password":"{{ dev_sample_postgres_password }}"}}' \
          http://127.0.0.1:18093/v1/schema:fetch \
          | jq -e '.tables | length > 0' >/dev/null
      args:
        executable: /bin/bash
      retries: 24
      delay: 5
      register: query_runner_schema_check
      until: query_runner_schema_check.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

    - name: Verify Go session-config execution in development
      shell: |
        set -euo pipefail
        curl --silent --show-error --fail \
          -H "content-type: application/json" \
          -d '{"sql":"select current_setting('"'"'TIMEZONE'"'"') as timezone, current_setting('"'"'search_path'"'"') as search_path","target":{"protocol":"postgresql","host":"{{ dev_sample_postgres_host }}","port":{{ dev_sample_postgres_port }},"database":"{{ dev_sample_postgres_database }}","sslMode":"{{ dev_sample_postgres_ssl_mode }}","username":"{{ dev_sample_postgres_user }}","password":"{{ dev_sample_postgres_password }}","sessionConfig":{"timezone":"Europe/Rome","searchPath":"public"}}}' \
          http://127.0.0.1:18093/v1/query-runs:execute \
          | jq -e '.rowCount == 1 and .rows[0].timezone == "Europe/Rome" and (.rows[0].search_path | tostring | contains("public"))' >/dev/null
      args:
        executable: /bin/bash
      retries: 24
      delay: 5
      register: query_runner_session_config_check
      until: query_runner_session_config_check.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

    - name: Verify Go write execution in development
      shell: |
        set -euo pipefail
        write_probe_table="ansible_query_runner_write_$(date +%s)"

        curl --silent --show-error --fail \
          -H "content-type: application/json" \
