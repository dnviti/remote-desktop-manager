    - name: Verify database session query API delegates PostgreSQL read-only execution in development
      shell: |
        set -euo pipefail

        api_base="{{ _dev_client_url }}/api"
        ca_cert="{{ arsenale_cert_dir }}/client/ca.pem"
        connection_name="Dev Go Query Runner Validation $(date +%s)"
        token_file="/tmp/arsenale-dev-access-token"
        access_token=""
        connection_id=""
        session_id=""

        cleanup() {
          if [ -n "${session_id}" ]; then
            curl --silent --show-error --fail \
              --cacert "${ca_cert}" \
              -H "authorization: Bearer ${access_token}" \
              -H "content-type: application/json" \
              -d '{}' \
              "${api_base}/sessions/database/${session_id}/end" >/dev/null || true
          fi

          if [ -n "${connection_id}" ]; then
            curl --silent --show-error --fail \
              --cacert "${ca_cert}" \
              -H "authorization: Bearer ${access_token}" \
              -X DELETE \
              "${api_base}/connections/${connection_id}" >/dev/null || true
          fi
        }
        trap cleanup EXIT

        if [ -s "${token_file}" ]; then
          access_token="$(cat "${token_file}")"
        else
          login_json="$(curl --silent --show-error --fail \
            --cacert "${ca_cert}" \
            -H 'content-type: application/json' \
            -d '{"email":"{{ arsenale_dev_bootstrap_admin_email }}","password":"{{ arsenale_dev_bootstrap_admin_password }}"}' \
            "${api_base}/auth/login")"
          access_token="$(printf '%s' "${login_json}" | jq -r '.accessToken')"
          printf '%s' "${access_token}" > "${token_file}"
        fi
        if [ -z "${access_token}" ] || [ "${access_token}" = "null" ]; then
          echo "login did not return an access token" >&2
          exit 1
        fi

        create_connection_json="$(curl --silent --show-error --fail \
          --cacert "${ca_cert}" \
          -H "authorization: Bearer ${access_token}" \
          -H 'content-type: application/json' \
          -d "{\"name\":\"${connection_name}\",\"type\":\"DATABASE\",\"host\":\"{{ dev_sample_postgres_host }}\",\"port\":{{ dev_sample_postgres_port }},\"username\":\"{{ dev_sample_postgres_user }}\",\"password\":\"{{ dev_sample_postgres_password }}\",\"dbSettings\":{\"protocol\":\"postgresql\",\"databaseName\":\"{{ dev_sample_postgres_database }}\",\"sslMode\":\"{{ dev_sample_postgres_ssl_mode }}\"}}" \
          "${api_base}/connections")"

        connection_id="$(printf '%s' "${create_connection_json}" | jq -r '.id')"
        if [ -z "${connection_id}" ] || [ "${connection_id}" = "null" ]; then
          echo "connection creation did not return an id" >&2
          exit 1
        fi

        create_session_json="$(curl --silent --show-error --fail \
          --cacert "${ca_cert}" \
          -H "authorization: Bearer ${access_token}" \
          -H 'content-type: application/json' \
          -d "{\"connectionId\":\"${connection_id}\"}" \
          "${api_base}/sessions/database")"

        session_id="$(printf '%s' "${create_session_json}" | jq -r '.sessionId')"
        if [ -z "${session_id}" ] || [ "${session_id}" = "null" ]; then
          echo "session creation did not return a sessionId" >&2
          exit 1
        fi

        heartbeat_json="$(curl --silent --show-error --fail \
          --cacert "${ca_cert}" \
          -H "authorization: Bearer ${access_token}" \
          -H 'content-type: application/json' \
          -d '{}' \
          "${api_base}/sessions/database/${session_id}/heartbeat")"

        printf '%s' "${heartbeat_json}" | jq -e '.ok == true' >/dev/null

        config_update_json="$(curl --silent --show-error --fail \
          --cacert "${ca_cert}" \
          -X PUT \
          -H "authorization: Bearer ${access_token}" \
          -H 'content-type: application/json' \
          -d '{"sessionConfig":{"timezone":"Europe/Rome","searchPath":"public"}}' \
          "${api_base}/sessions/database/${session_id}/config")"

        printf '%s' "${config_update_json}" | jq -e '.applied == true and .sessionConfig.timezone == "Europe/Rome" and .sessionConfig.searchPath == "public"' >/dev/null

        config_json="$(curl --silent --show-error --fail \
          --cacert "${ca_cert}" \
          -H "authorization: Bearer ${access_token}" \
          "${api_base}/sessions/database/${session_id}/config")"

        printf '%s' "${config_json}" | jq -e '.timezone == "Europe/Rome" and .searchPath == "public"' >/dev/null

        session_config_query_json="$(curl --silent --show-error --fail \
          --cacert "${ca_cert}" \
          -H "authorization: Bearer ${access_token}" \
          -H 'content-type: application/json' \
          -d '{"sql":"select current_setting('"'"'TIMEZONE'"'"') as timezone, current_setting('"'"'search_path'"'"') as search_path"}' \
          "${api_base}/sessions/database/${session_id}/query")"

        printf '%s' "${session_config_query_json}" | jq -e '.rowCount == 1 and .rows[0].timezone == "Europe/Rome" and (.rows[0].search_path | tostring | contains("public"))' >/dev/null

        query_json="$(curl --silent --show-error --fail \
          --cacert "${ca_cert}" \
          -H "authorization: Bearer ${access_token}" \
          -H 'content-type: application/json' \
          -d '{"sql":"select current_database() as database_name"}' \
          "${api_base}/sessions/database/${session_id}/query")"

        printf '%s' "${query_json}" | jq -e '.rowCount == 1 and .rows[0].database_name == "{{ dev_sample_postgres_database }}"' >/dev/null

        explain_json="$(curl --silent --show-error --fail \
          --cacert "${ca_cert}" \
          -H "authorization: Bearer ${access_token}" \
          -H 'content-type: application/json' \
          -d '{"sql":"select current_database() as database_name"}' \
          "${api_base}/sessions/database/${session_id}/explain")"

        printf '%s' "${explain_json}" | jq -e '.supported == true and .format == "json"' >/dev/null

        introspect_version_json="$(curl --silent --show-error --fail \
          --cacert "${ca_cert}" \
          -H "authorization: Bearer ${access_token}" \
          -H 'content-type: application/json' \
          -d '{"type":"database_version"}' \
          "${api_base}/sessions/database/${session_id}/introspect")"

        printf '%s' "${introspect_version_json}" | jq -e '.supported == true and (.data.version | type == "string")' >/dev/null

        introspect_schema_json="$(curl --silent --show-error --fail \
          --cacert "${ca_cert}" \
          -H "authorization: Bearer ${access_token}" \
          -H 'content-type: application/json' \
          -d '{"type":"table_schema","target":"demo_customers"}' \
          "${api_base}/sessions/database/${session_id}/introspect")"

        printf '%s' "${introspect_schema_json}" | jq -e '.supported == true and (.data | length > 0)' >/dev/null

        schema_json="$(curl --silent --show-error --fail \
          --cacert "${ca_cert}" \
          -H "authorization: Bearer ${access_token}" \
          "${api_base}/sessions/database/${session_id}/schema")"

        printf '%s' "${schema_json}" | jq -e '.tables | length > 0' >/dev/null
      args:
        executable: /bin/bash
      register: go_db_session_check
      retries: 24
      delay: 5
      until: go_db_session_check.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

    - name: Wait for development readiness endpoint
      command: >
        curl --silent --show-error --fail
        --cacert {{ arsenale_cert_dir }}/client/ca.pem
        {{ _dev_client_url }}/api/ready
      retries: 24
      delay: 5
      register: dev_ready_check
      until: dev_ready_check.rc == 0
      changed_when: false
      when: _is_dev | bool and _state == 'present'

    - name: Development ready
      debug:
        msg: |
          Arsenale dev stack running (all services, verbose logging).
          Run on host for hot-reload: npm run dev
          Stop: ansible-playbook playbooks/deploy.yml -e arsenale_env=development -e arsenale_state=absent
      when: _is_dev | bool and _state == 'present'
