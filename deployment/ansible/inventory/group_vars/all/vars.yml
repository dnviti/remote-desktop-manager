# Arsenale Configuration (non-secret values only)
arsenale_domain: arsenale.home.arpa.viti
arsenale_client_port: 3000
arsenale_client_bind_host: 127.0.0.1
arsenale_public_url: https://arsenale.home.arpa.viti
arsenale_ssh_port: 2222
arsenale_control_plane_api_port: 18080
arsenale_control_plane_controller_port: 18081
arsenale_authz_pdp_port: 18082
arsenale_model_gateway_port: 18083
arsenale_tool_gateway_port: 18084
arsenale_agent_orchestrator_port: 18085
arsenale_memory_service_port: 18086
arsenale_terminal_broker_port: 18090
arsenale_desktop_broker_port: 18091
arsenale_tunnel_broker_port: 18092
arsenale_query_runner_port: 18093
arsenale_runtime_agent_port: 18095
arsenale_map_assets_port: 18096
arsenale_node_env: production

# Database
arsenale_db_user: arsenale
arsenale_db_name: arsenale

# Networking
arsenale_trust_proxy: false
arsenale_allow_local_network: true
arsenale_cookie_secure: true
arsenale_service_bind_host: 0.0.0.0
arsenale_dev_bootstrap_admin_email: admin@example.com
arsenale_dev_bootstrap_admin_username: admin
arsenale_dev_bootstrap_admin_password: ArsenaleTemp91Qx
arsenale_dev_bootstrap_tenant_name: Development Environment

# Features
arsenale_self_signup_enabled: false
arsenale_email_verify_required: false
arsenale_recording_enabled: true
arsenale_email_provider: smtp

# Shared file staging
arsenale_file_threat_scanner_mode: builtin
arsenale_shared_files_s3_bucket: ""
arsenale_shared_files_s3_region: us-east-1
arsenale_shared_files_s3_endpoint: ""
arsenale_shared_files_s3_access_key_id: ""
arsenale_shared_files_s3_prefix: ""
arsenale_shared_files_s3_force_path_style: false
arsenale_shared_files_s3_auto_create_bucket: false
arsenale_dev_shared_files_s3_image: quay.io/minio/minio:latest
arsenale_dev_shared_files_s3_bucket: arsenale-shared-files
arsenale_dev_shared_files_s3_region: us-east-1
arsenale_dev_shared_files_s3_endpoint: http://shared-files-s3:9000
arsenale_dev_shared_files_s3_access_key_id: arsenale
arsenale_dev_shared_files_s3_secret_access_key: arsenale-dev-shared-files
arsenale_dev_shared_files_s3_prefix: staged
arsenale_dev_shared_files_s3_force_path_style: true
arsenale_dev_shared_files_s3_auto_create_bucket: true

# Container images
# Development installs always build from the local checkout.
# Production and Kubernetes installs pull these images when arsenale_build_images is false.
arsenale_build_images: false
arsenale_registry: ghcr.io/dnviti/arsenale
arsenale_image_tag: latest
arsenale_postgres_image: "quay.io/sclorg/postgresql-16-c10s"
arsenale_postgres_data_dir: "/var/lib/pgsql/data"
arsenale_guacd_image: "{{ arsenale_registry }}/guacd:{{ arsenale_image_tag }}"
arsenale_component_images:
  migrate: "{{ arsenale_registry }}/control-plane-api:{{ arsenale_image_tag }}"
  control-plane-api: "{{ arsenale_registry }}/control-plane-api:{{ arsenale_image_tag }}"
  control-plane-controller: "{{ arsenale_registry }}/control-plane-controller:{{ arsenale_image_tag }}"
  authz-pdp: "{{ arsenale_registry }}/authz-pdp:{{ arsenale_image_tag }}"
  model-gateway: "{{ arsenale_registry }}/model-gateway:{{ arsenale_image_tag }}"
  tool-gateway: "{{ arsenale_registry }}/tool-gateway:{{ arsenale_image_tag }}"
  terminal-broker: "{{ arsenale_registry }}/terminal-broker:{{ arsenale_image_tag }}"
  desktop-broker: "{{ arsenale_registry }}/desktop-broker:{{ arsenale_image_tag }}"
  tunnel-broker: "{{ arsenale_registry }}/tunnel-broker-go:{{ arsenale_image_tag }}"
  query-runner: "{{ arsenale_registry }}/query-runner:{{ arsenale_image_tag }}"
  map-assets: "{{ arsenale_registry }}/map-assets:{{ arsenale_image_tag }}"
  memory-service: "{{ arsenale_registry }}/memory-service:{{ arsenale_image_tag }}"
  agent-orchestrator: "{{ arsenale_registry }}/agent-orchestrator:{{ arsenale_image_tag }}"
  runtime-agent: "{{ arsenale_registry }}/runtime-agent:{{ arsenale_image_tag }}"
  client: "{{ arsenale_registry }}/client:{{ arsenale_image_tag }}"
  guacd: "{{ arsenale_guacd_image }}"
  guacenc: "{{ arsenale_registry }}/guacenc:{{ arsenale_image_tag }}"
  ssh-gateway: "{{ arsenale_registry }}/ssh-gateway:{{ arsenale_image_tag }}"
  db-proxy: "{{ arsenale_registry }}/db-proxy:{{ arsenale_image_tag }}"

# TLS
arsenale_generate_certs: true
arsenale_cert_dir: "{{ arsenale_home }}/certs"
arsenale_cert_validity_days: 365
arsenale_ca_validity_days: 3650

# Firewall
arsenale_firewall_enabled: true
arsenale_allowed_ssh_sources: ["0.0.0.0/0"]
arsenale_allowed_web_sources: ["0.0.0.0/0"]

# Scalability
arsenale_server_replicas: 1

# Container resource limits
arsenale_resource_limits:
  postgres: { cpus: "1.0", memory: "1g", pids: 256 }
  guacd: { cpus: "1.0", memory: "512m", pids: 256 }
  guacenc: { cpus: "1.0", memory: "768m", pids: 256 }
  server: { cpus: "2.0", memory: "1536m", pids: 512 }
  client: { cpus: "0.75", memory: "256m", pids: 256 }
  go_service: { cpus: "0.5", memory: "512m", pids: 128 }
  ssh_gateway: { cpus: "0.5", memory: "256m", pids: 128 }
  db_proxy: { cpus: "0.5", memory: "256m", pids: 128 }

# Backup
arsenale_backup_dir: "{{ arsenale_home }}/backups"
arsenale_backup_retention_days: 30
