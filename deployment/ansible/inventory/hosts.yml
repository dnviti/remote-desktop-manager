all:
  hosts:
    arsenale-control-plane:
      ansible_host: "{{ lookup('env', 'ARSENALE_HOST') | default('localhost', true) }}"
      ansible_user: >-
        {{
          lookup('env', 'ARSENALE_DEPLOY_USER')
          | default(lookup('env', 'ARSENALE_USER'), true)
          | default(lookup('env', 'USER'), true)
        }}
      ansible_python_interpreter: /usr/bin/python3
  vars:
    arsenale_user: arsenale
    arsenale_home: /opt/arsenale
    arsenale_repo: https://github.com/dnviti/arsenale.git
    arsenale_version: main
